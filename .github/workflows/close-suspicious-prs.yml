name: Close Suspicious PRs

# Detects and auto-closes pull requests that exhibit patterns associated with
# supply-chain attacks on CI/CD systems. Covers three attack categories:
#
#   1. Metadata injection  – shell / PowerShell payloads hidden in branch
#      names, PR titles, or commit messages.
#   2. CI/CD tampering     – fork PRs that modify workflow files, pipeline
#      definitions, CI scripts, or build configuration.
#   3. Dependency poisoning – fork PRs that add malicious npm lifecycle
#      scripts or alter registry configuration.
#
# Detection logic lives in eng/tools/detect-suspicious-pr/ (TypeScript)
# and is covered by vitest tests in the same package.
#
# Uses pull_request_target so the workflow code always comes from the base
# branch (safe), while retaining write permissions to close fork PRs.
#
# Reference attack: https://github.com/Azure/azure-sdk-for-js/pull/37419

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions: {}

jobs:
  check-suspicious-pr:
    name: Detect suspicious PR patterns
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # pull_request_target checks out the base branch by default – safe.
          sparse-checkout: eng/tools/detect-suspicious-pr

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install detection tool
        working-directory: eng/tools/detect-suspicious-pr
        run: npm ci --ignore-scripts

      - name: Gather PR metadata and run detection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          # Pass all attacker-controlled values through env vars – never
          # interpolate them directly in the run: block with ${{ }}.
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        shell: bash
        run: |
          set -euo pipefail

          # ── Determine fork status ──────────────────────────────────────
          is_fork=false
          [[ "$HEAD_REPO" != "$BASE_REPO" ]] && is_fork=true

          # ── Collect commit message subjects ────────────────────────────
          api_failed=false

          commits_json=$(
            gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate \
              --jq '.[].commit.message | split("\n") | .[0]' \
              | jq -s '.' 2>/dev/null
          ) || { echo "::warning::Failed to fetch commit data"; commits_json="[]"; api_failed=true; }

          # ── Collect changed file paths and package.json patches ──────
          files_raw=$(
            gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate 2>/dev/null
          ) || { echo "::warning::Failed to fetch file data"; files_raw="[]"; api_failed=true; }

          files_json=$(echo "$files_raw" | jq -s '[.[][].filename]' 2>/dev/null || echo "[]")

          patches_json="{}"
          if [[ "$is_fork" == "true" ]]; then
            patches_json=$(echo "$files_raw" | jq -s '
              [.[][] | select(.filename | endswith("package.json")) | select(.patch) |
                { key: .filename, value: .patch }] | from_entries
            ' 2>/dev/null || echo "{}")
          fi

          # ── Build input JSON and run detection ─────────────────────────
          input=$(jq -n \
            --arg branch "$HEAD_REF" \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --argjson commits "$commits_json" \
            --argjson files "$files_json" \
            --argjson patches "$patches_json" \
            --argjson isFork "$is_fork" \
            '{
              branchName: $branch,
              title: $title,
              body: $body,
              commitMessages: $commits,
              isFork: $isFork,
              changedFiles: $files,
              packagePatches: $patches
            }')

          echo "::group::Detection input"
          echo "$input" | jq .
          echo "::endgroup::"

          # Run the TypeScript detector – stdout is JSON, stderr goes to the job log
          result=$(echo "$input" | \
            (cd eng/tools/detect-suspicious-pr && node --experimental-strip-types src/run.ts)) \
            && suspicious=false || suspicious=true

          echo "::group::Detection result"
          echo "$result"
          echo "::endgroup::"

          if [[ "$suspicious" == "false" && "$api_failed" == "true" && "$is_fork" == "true" ]]; then
            echo "::error::API data was incomplete for fork PR – failing closed for safety"
            exit 1
          fi

          if [[ "$suspicious" == "true" ]]; then
            echo "::error::PR #$PR_NUMBER flagged as suspicious – closing"

            # Format reasons as a markdown list
            reason_list=$(echo "$result" | jq -r '
              if .reasons then
                .reasons[] | "- " + (.message | gsub("[\\[\\]()!`*~<>#|\\n\\r]"; ""))
              else
                empty
              end
            ' 2>/dev/null || echo "- Detection returned a non-zero exit code")

            body="## ⚠️ Suspicious Pull Request — Automatically Closed

          This PR was **automatically closed** because it matches patterns associated
          with supply-chain attacks targeting CI/CD systems.

          **Detected issues:**
          ${reason_list}

          > [!NOTE]
          > If this was a false positive, please contact a repository maintainer to
          > review and reopen the PR.

          ---
          <sub>🔒 Flagged by <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">close-suspicious-prs</a></sub>"

            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
            gh pr edit    "$PR_NUMBER" --repo "$REPO" --add-label "suspicious-pr"
            gh pr close   "$PR_NUMBER" --repo "$REPO"
            exit 1
          fi

          echo "✅ PR #$PR_NUMBER passed all security checks"

  # ── Job 2: Scan PR comments and reviews for injection ──────────────────────
  check-suspicious-pr-comment:
    name: Detect suspicious PR comment/review
    if: >-
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          sparse-checkout: eng/tools/detect-suspicious-pr

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install detection tool
        working-directory: eng/tools/detect-suspicious-pr
        run: npm ci --ignore-scripts

      - name: Scan comment/review for injection patterns
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # PR number comes from different event shapes
          PR_NUMBER_FROM_ISSUE: ${{ github.event.issue.number || '' }}
          PR_NUMBER_FROM_PR: ${{ github.event.pull_request.number || '' }}
          # Pass attacker-controlled values through env vars – never
          # interpolate them directly in the run: block with ${{ }}.
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          REVIEW_BODY: ${{ github.event.review.body || '' }}
        shell: bash
        run: |
          set -euo pipefail

          # ── Resolve PR number from the event type ─────────────────────
          PR_NUMBER="${PR_NUMBER_FROM_PR:-$PR_NUMBER_FROM_ISSUE}"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "::error::Could not determine PR number from event context"
            exit 1
          fi

          # ── Build input JSON and run detection ────────────────────────
          input=$(jq -n \
            --arg branch "" \
            --arg title "" \
            --arg comment "$COMMENT_BODY" \
            --arg review "$REVIEW_BODY" \
            '{
              branchName: $branch,
              title: $title,
              commitMessages: [],
              isFork: false,
              changedFiles: [],
              packagePatches: {},
              commentBody: $comment,
              reviewBody: $review
            }')

          echo "::group::Detection input"
          echo "$input" | jq .
          echo "::endgroup::"

          # Run the TypeScript detector – stdout is JSON, stderr goes to the job log
          result=$(echo "$input" | \
            (cd eng/tools/detect-suspicious-pr && node --experimental-strip-types src/run.ts)) \
            && suspicious=false || suspicious=true

          echo "::group::Detection result"
          echo "$result"
          echo "::endgroup::"

          if [[ "$suspicious" == "true" ]]; then
            echo "::error::PR #$PR_NUMBER has a suspicious comment/review – flagging"

            # Format reasons as a markdown list
            reason_list=$(echo "$result" | jq -r '
              if .reasons then
                .reasons[] | "- " + (.message | gsub("[\\[\\]()!`*~<>#|\\n\\r]"; ""))
              else
                empty
              end
            ' 2>/dev/null || echo "- Detection returned a non-zero exit code")

            body="## ⚠️ Suspicious PR Comment/Review — Automatically Flagged

          A comment or review on this PR was flagged because it matches patterns
          associated with supply-chain attacks targeting CI/CD systems.

          **Detected issues:**
          ${reason_list}

          > [!NOTE]
          > If this was a false positive, please contact a repository maintainer to
          > review and remove the \`suspicious-comment\` label.

          ---
          <sub>🔒 Flagged by <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">close-suspicious-prs</a></sub>"

            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
            gh pr edit    "$PR_NUMBER" --repo "$REPO" --add-label "suspicious-comment"
            exit 1
          fi

          echo "✅ PR #$PR_NUMBER comment/review passed all security checks"
