# Warp build tool validation — build, format, lint, and unit tests.
name: Warp CI

on:
  push:
    branches:
      - main
      - feature/*
      - hotfix/*
    paths:
      - .github/workflows/warp-ci.yml
      - common/tools/warp/**
  pull_request:
    branches:
      - main
      - feature/*
      - hotfix/*
    paths:
      - .github/workflows/warp-ci.yml
      - common/tools/warp/**

permissions:
  contents: read

jobs:
  validate:
    name: Warp validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Build
        run: pnpm --filter @microsoft/warp... build

      - name: Check format
        run: pnpm --filter @microsoft/warp... check-format

      - name: Lint
        run: pnpm --filter @microsoft/warp... lint

      - name: Unit tests
        run: pnpm --filter @microsoft/warp test
