# Warp build tool validation — format, lint, and unit tests, plus
# integration builds of representative client libraries across categories.
# This is a lightweight pipeline similar to common/tools/dev-tool/ci.yml.

trigger:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - common/tools/warp/

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - common/tools/warp/

jobs:
  - job: "Warp"
    displayName: "Warp validation"

    variables:
      - template: /eng/pipelines/templates/variables/globals.yml
      - template: /eng/pipelines/templates/variables/image.yml

    pool:
      name: $(LINUXPOOL)
      demands: ImageOverride -equals $(LINUXVMIMAGE)

    steps:
      - template: /eng/pipelines/templates/steps/common.yml

      - script: |
          npm install -g pnpm
        displayName: "Install pnpm"

      - script: |
          pnpm install
        displayName: "Install dependencies"

      - script: |
          pnpm --filter @microsoft/warp... build
        displayName: "Build warp"

      - script: |
          pnpm --filter @microsoft/warp... check-format
        displayName: "Check format"

      - script: |
          pnpm --filter @microsoft/warp... lint
        displayName: "Lint"

      - script: |
          pnpm --filter @microsoft/warp test
        displayName: "Run unit tests"

      # Build representative client libraries to catch regressions across
      # package categories: large data-plane, custom warp targets, custom
      # tsconfigs, management (ARM), and RLC/rest.
      - script: |
          pnpm turbo build --filter=@azure/storage-blob... --filter=@azure/identity... --filter=@azure/keyvault-keys... --filter=@azure/event-hubs... --filter=@azure/arm-containerservice... --filter=@azure-rest/batch... --token 1 --concurrency=4
        displayName: "Build representative client libraries"
