# JS SDK TypeSpec breaking-change check pipeline (ARM only).
#
# All non-trivial logic lives in eng/pipelines/scripts/regenerate-shard.js
# (5 subcommands: resolve-emitter, prepare, shard, aggregate, apply-patches).
# This YAML is the orchestration shell:
#
#   Setup              → resolve emitter dev tag + build per-shard matrix
#   RegenerateAndBuild → per matrix shard: patch emitter-package.json, run
#                        TypeSpec-Project-{Sync,Generate}.ps1 per pkg, single
#                        `pnpm turbo build`, `npm exec update-changelog` per
#                        built pkg, emit result.json + changes.patch
#   SummaryAndPR       → aggregate per-shard result.json → summary artifact;
#                        if CreatePullRequest=true and regen succeeded, 3-way
#                        apply per-shard patches onto target branch (fork or
#                        upstream), push, then Submit-PullRequest.ps1.

trigger:
  branches:
    include: [main]
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

pr:
  branches:
    include: [main, feature/*, hotfix/*]
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches: { include: [main] }

parameters:
  - name: EmitterVersion
    displayName: "Emitter version (default 'empty' = latest dev tag)"
    type: string
    default: 'empty'
  - name: MaxWorkers
    displayName: "Per-shard regen concurrency"
    type: number
    default: 4
  - name: BuildConcurrency
    displayName: "pnpm turbo --concurrency per shard"
    type: number
    default: 4
  - name: RegenerationJobCount
    displayName: "Matrix shard count"
    type: number
    default: 10
  - name: MinimumPerJob
    displayName: "Minimum packages per shard"
    type: number
    default: 10
  - name: SkipBuild
    type: boolean
    default: false
  - name: QuickTest
    displayName: "Quick test (only 3 small ARM packages, 1 shard; overrides PackageFilter / matrix sizing)"
    type: boolean
    default: false
  - name: PackageFilter
    displayName: "Package filter (comma-separated wildcards; 'arm-*' = all)"
    type: string
    default: 'arm-*'
  - name: SpecRepoBranch
    type: string
    default: 'main'
  - name: CreatePullRequest
    type: boolean
    default: false
  - name: ChangePushMode
    displayName: "Changes pushed in PR ('all' or 'api-md')"
    type: string
    default: 'all'
    values: [all, api-md]
  - name: PullRequestTargetBranch
    type: string
    default: 'main'
  - name: PullRequestBranch
    displayName: "PR source branch (empty = auto)"
    type: string
    default: ''
  - name: PullRequestRepoOwner
    displayName: "PR target repo OWNER (empty = same as source; e.g. 'wxl534' to PR to a fork)"
    type: string
    default: ''
  - name: PullRequestRepoName
    displayName: "PR target repo NAME (empty = same as source repo name)"
    type: string
    default: ''
  - name: ForkTokenVariableName
    displayName: "ADO secret variable holding the GitHub PAT (required when targeting a fork)"
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '22.x'

stages:
- stage: SDKRegenerate
  displayName: 'TypeSpec emitter breaking-change check'
  jobs:

  # ----- Setup: resolve emitter version + build per-shard matrix -----
  - job: Setup
    variables:
      ${{ if parameters.QuickTest }}:
        effFilter: 'arm-alertprocessingrules,arm-alertrulerecommendations,arm-alertsmanagement'
        effJobCount: 1
        effMinPerJob: 1
      ${{ else }}:
        effFilter: ${{ parameters.PackageFilter }}
        effJobCount: ${{ parameters.RegenerationJobCount }}
        effMinPerJob: ${{ parameters.MinimumPerJob }}
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        submodules: false
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - bash: |
          node $(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js resolve-emitter \
            --input '${{ parameters.EmitterVersion }}'
        name: resolveVersion
        displayName: 'Resolve emitter version'
      - task: PowerShell@2
        name: generateMatrix
        displayName: 'Build matrix'
        inputs:
          pwsh: true
          targetType: inline
          script: |
            & $(Build.SourcesDirectory)/eng/common/scripts/New-RegenerateMatrix.ps1 `
              -OutputDirectory $(Build.ArtifactStagingDirectory)/matrix `
              -OutputVariableName matrix `
              -JobCount $(effJobCount) `
              -MinimumPerJob $(effMinPerJob) `
              -OnlyTypeSpec true `
              -DirectoryFilterPattern '$(effFilter)'
            if ($LASTEXITCODE) { exit $LASTEXITCODE }
      - publish: $(Build.ArtifactStagingDirectory)/matrix
        artifact: matrix_artifacts

  # ----- Regenerate & build per shard -----
  - job: RegenerateAndBuild
    dependsOn: Setup
    timeoutInMinutes: 180
    strategy:
      matrix: $[ dependencies.Setup.outputs['generateMatrix.matrix'] ]
    variables:
      emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        submodules: false
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - download: current
        artifact: matrix_artifacts

      # Patch eng/emitter-package.json with the resolved emitter version,
      # regenerate the lock file, pre-install js-sdk-release-tools (avoids the
      # Windows-backslash bug in update-changelog-content.ps1), and shallow-clone
      # the spec repo so TypeSpec-Project-Sync can copy from it.
      - bash: |
          node $(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js prepare \
            --emitterVersion "$(emitterVersion)" \
            --specRepoBranch "${{ parameters.SpecRepoBranch }}" \
            --specRepoRoot "$(specRepoRoot)"
        displayName: 'Prepare emitter + spec repo'

      - bash: |
          node $(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js shard \
            --specRepoRoot "$(specRepoRoot)" \
            --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
            --resultOutputDir "$(Build.ArtifactStagingDirectory)/results/$(JobKey)" \
            --maxWorkers "${{ parameters.MaxWorkers }}" \
            --buildConcurrency "${{ parameters.BuildConcurrency }}" \
            --skipBuild "${{ parameters.SkipBuild }}" \
            --pushMode "${{ parameters.ChangePushMode }}"
        displayName: 'Regenerate + build shard'
        workingDirectory: $(sdkRoot)

      - publish: $(Build.ArtifactStagingDirectory)/results/$(JobKey)
        artifact: regen_result_$(JobKey)
        condition: always()

  # ----- Aggregate results + (optionally) open PR -----
  - job: SummaryAndPR
    dependsOn: [Setup, RegenerateAndBuild]
    condition: succeededOrFailed()
    variables:
      emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        submodules: false
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - download: current

      # Always aggregate first — exit 1 on regen/build failures naturally gates
      # the conditional PR steps below (their default succeeded() condition skips
      # them when this step fails), reproducing the old Summary→CreatePR gate.
      - bash: |
          node "$(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js" aggregate \
            --workspace "$(Pipeline.Workspace)" \
            --outDir "$(Build.ArtifactStagingDirectory)/summary" \
            --emitterVersion "$(emitterVersion)" \
            --buildNumber "$(Build.BuildNumber)" \
            --buildUrl "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
            --definitionName "$(Build.DefinitionName)" \
            --pushMode "${{ parameters.ChangePushMode }}"
        displayName: 'Aggregate shard results'
      - publish: $(Build.ArtifactStagingDirectory)/summary
        artifact: regen_summary
        condition: always()

      - ${{ if parameters.CreatePullRequest }}:
        # Use the org-level GitHub App token only when not targeting a fork;
        # otherwise the user PAT from FORK_TOKEN is used by apply-patches.
        - ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
          - template: /eng/common/pipelines/templates/steps/login-to-github.yml
            parameters:
              TokenOwners: [Azure]

        - bash: |
            node "$(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js" apply-patches \
              --sourceRepo "$(Build.Repository.Name)" \
              --targetOwner "${{ parameters.PullRequestRepoOwner }}" \
              --targetName "${{ parameters.PullRequestRepoName }}" \
              --targetBranch "${{ parameters.PullRequestTargetBranch }}" \
              --branch "${{ parameters.PullRequestBranch }}" \
              --buildId "$(Build.BuildId)" \
              --workspace "$(Pipeline.Workspace)" \
              --failedPatchesFile "$(Pipeline.Workspace)/failed-patches.txt"
          workingDirectory: $(sdkRoot)
          displayName: 'Apply shard patches'
          env:
            ${{ if ne(parameters.ForkTokenVariableName, '') }}:
              FORK_TOKEN: $(${{ parameters.ForkTokenVariableName }})
            ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
              GH_TOKEN_VAL: $(GH_TOKEN)

        # Re-aggregate so pr-body.md includes the "files dropped due to upstream
        # conflicts" section from failed-patches.txt. Overwrites the summary/.
        - bash: |
            node "$(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js" aggregate \
              --workspace "$(Pipeline.Workspace)" \
              --outDir "$(Build.ArtifactStagingDirectory)/summary" \
              --emitterVersion "$(emitterVersion)" \
              --buildNumber "$(Build.BuildNumber)" \
              --buildUrl "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
              --definitionName "$(Build.DefinitionName)" \
              --pushMode "${{ parameters.ChangePushMode }}" \
              --failedPatchesFile "$(Pipeline.Workspace)/failed-patches.txt" || true
          displayName: 'Compose PR body'

        - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
          parameters:
            BaseRepoBranch: $(PRBranchName)
            BaseRepoOwner: $(TargetRepoOwner)
            TargetRepoOwner: $(TargetRepoOwner)
            TargetRepoName: $(TargetRepoName)
            CommitMsg: 'TypeSpec regeneration (${{ parameters.ChangePushMode }}) for emitter $(emitterVersion)'
            PushArgs: --force
            WorkingDirectory: $(sdkRoot)
            AuthToken: $(PushToken)

        - task: PowerShell@2
          displayName: 'Create pull request'
          condition: and(succeeded(), eq(variables['HasChanges'], 'true'))
          inputs:
            pwsh: true
            targetType: inline
            script: |
              $body = Get-Content '$(Build.ArtifactStagingDirectory)/summary/pr-body.md' -Raw
              & '$(sdkRoot)/eng/common/scripts/Submit-PullRequest.ps1' `
                -RepoOwner '$(TargetRepoOwner)' -RepoName '$(TargetRepoName)' `
                -BaseBranch '${{ parameters.PullRequestTargetBranch }}' `
                -PROwner '$(TargetRepoOwner)' -PRBranch '$(PRBranchName)' `
                -AuthToken '$(PushToken)' `
                -PRTitle "TypeSpec regeneration: emitter $(emitterVersion) [${{ parameters.ChangePushMode }}]" `
                -PRBody $body
