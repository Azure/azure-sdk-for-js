# JS SDK TypeSpec breaking-change check pipeline (ARM only).
#
# Architecture (mirrors azure-sdk-for-net's archetype-typespec-emitter.yml):
#   Setup              Resolve emitter version, build shard matrix, and
#                      (when CreatePullRequest=true) push an initial commit
#                      containing the resolved eng/emitter-package* to the
#                      PR branch on the target repo / fork.
#   RegenerateAndBuild Matrix shards. Each shard switches to the PR branch,
#                      regenerates its slice of packages, then uses the
#                      shared git-push-changes.yml template to commit + push
#                      (the template's git-branch-push.ps1 already handles
#                      fetch / rebase / retry on push conflicts).
#   CreatePR           Opens the GitHub PR. Body is build-metadata only —
#                      per-package outcomes live in the ADO build log.
#
# All shard logic lives in eng/pipelines/scripts/regenerate-shard.js.

trigger:
  branches: { include: [main] }
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/regenerate-shard.js

pr:
  branches: { include: [main, feature/*, hotfix/*] }
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/regenerate-shard.js

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches: { include: [main] }

parameters:
  - name: EmitterVersion
    displayName: "Emitter version (default 'empty' = latest dev tag)"
    type: string
    default: 'empty'

  - name: SkipBuild
    type: boolean
    default: false
  - name: PackageFilter
    displayName: "Package filter (comma-separated wildcards; 'arm-*' = all)"
    type: string
    default: 'arm-*'
  - name: SpecRepoBranch
    type: string
    default: 'main'

  - name: CreatePullRequest
    type: boolean
    default: false
  - name: PullRequestTargetBranch
    type: string
    default: 'main'
  - name: PullRequestBranch
    displayName: "PR source branch (empty = sdk-regenerate-<buildId>)"
    type: string
    default: ''
  - name: PullRequestRepoOwner
    displayName: "PR target repo OWNER (e.g. 'wxl534' for a fork; default 'Azure')"
    type: string
    default: ''
  - name: PullRequestRepoName
    displayName: "PR target repo NAME (default 'azure-sdk-for-js')"
    type: string
    default: ''
  - name: ForkTokenVariableName
    displayName: "ADO secret variable holding the GitHub PAT (required when CreatePullRequest=true)"
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: sdkRoot
    value: $(Build.SourcesDirectory)
  - name: specRepoRoot
    value: $(Agent.BuildDirectory)/azure-rest-api-specs
  - name: nodeVersion
    value: '22.x'
  - name: shardScript
    value: $(Build.SourcesDirectory)/eng/pipelines/scripts/regenerate-shard.js
  - ${{ if ne(parameters.PullRequestBranch, '') }}:
    - name: prBranchName
      value: ${{ parameters.PullRequestBranch }}
  - ${{ else }}:
    - name: prBranchName
      value: sdk-regenerate-$(Build.BuildId)
  - ${{ if ne(parameters.PullRequestRepoOwner, '') }}:
    - name: targetOwner
      value: ${{ parameters.PullRequestRepoOwner }}
  - ${{ else }}:
    - name: targetOwner
      value: Azure
  - ${{ if ne(parameters.PullRequestRepoName, '') }}:
    - name: targetName
      value: ${{ parameters.PullRequestRepoName }}
  - ${{ else }}:
    - name: targetName
      value: azure-sdk-for-js
  - ${{ if parameters.CreatePullRequest }}:
    - name: shardPrepareMode
      value: shard
    - name: shardScriptInvoke
      value: $(Agent.TempDirectory)/regenerate-shard.js
  - ${{ else }}:
    - name: shardPrepareMode
      value: full
    - name: shardScriptInvoke
      value: $(Build.SourcesDirectory)/eng/pipelines/scripts/regenerate-shard.js

stages:
- stage: SDKRegenerate
  displayName: 'TypeSpec emitter breaking-change check'
  jobs:

  - job: Setup
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        submodules: false
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }

      - bash: node $(shardScript) resolve-emitter --input '${{ parameters.EmitterVersion }}'
        name: resolveVersion
        displayName: 'Resolve emitter version'

      - bash: |
          node $(shardScript) build-matrix \
            --filter "${{ parameters.PackageFilter }}" \
            --outDir "$(Build.ArtifactStagingDirectory)/matrix"
        name: generateMatrix
        displayName: 'Build shard matrix'

      - publish: $(Build.ArtifactStagingDirectory)/matrix
        artifact: matrix_artifacts

      - ${{ if parameters.CreatePullRequest }}:
        - bash: |
            node $(shardScript) setup-pr-branch --mode base \
              --targetBranch "${{ parameters.PullRequestTargetBranch }}" \
              --prBranch     "$(prBranchName)"
            node $(shardScript) prepare --mode emitter \
              --emitterVersion "$(resolveVersion.emitterVersion)"
          displayName: 'Prepare initial emitter-package commit'

        - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
          parameters:
            BaseRepoOwner:  $(targetOwner)
            TargetRepoName: $(targetName)
            BaseRepoBranch: $(prBranchName)
            CommitMsg:      'Initial: pin emitter $(resolveVersion.emitterVersion)'
            AuthToken:      $(${{ parameters.ForkTokenVariableName }})
            PushArgs:       --force

  - job: RegenerateAndBuild
    dependsOn: Setup
    timeoutInMinutes: 180
    strategy:
      matrix: $[ dependencies.Setup.outputs['generateMatrix.matrix'] ]
    variables:
      emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
    steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        submodules: false
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - download: current
        artifact: matrix_artifacts

      - ${{ if parameters.CreatePullRequest }}:
        # Copy the script outside the working tree (the PR branch is based on
        # main and does NOT contain the pipeline source under feature/break-check),
        # add the fork remote, and switch to the PR branch. See switch-to-pr-branch.
        - bash: |
            node $(shardScript) setup-pr-branch --mode switch \
              --targetOwner  "$(targetOwner)" \
              --targetName   "$(targetName)" \
              --prBranch     "$(prBranchName)" \
              --scriptSource "$(shardScript)" \
              --scriptDest   "$(Agent.TempDirectory)/regenerate-shard.js"
          displayName: 'Switch to PR branch'
          env:
            PUSH_TOKEN: $(${{ parameters.ForkTokenVariableName }})

      - bash: |
          node "$(shardScriptInvoke)" prepare \
            --mode           "$(shardPrepareMode)" \
            --emitterVersion "$(emitterVersion)" \
            --specRepoBranch "${{ parameters.SpecRepoBranch }}" \
            --specRepoRoot   "$(specRepoRoot)"
        displayName: 'Prepare (install tools, clone spec repo)'

      - bash: |
          node "$(shardScriptInvoke)" shard \
            --specRepoRoot  "$(specRepoRoot)" \
            --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
            --skipBuild     "${{ parameters.SkipBuild }}"
        displayName: 'Regenerate + build shard'
        workingDirectory: $(sdkRoot)

      - ${{ if parameters.CreatePullRequest }}:
        - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
          parameters:
            BaseRepoOwner:  $(targetOwner)
            TargetRepoName: $(targetName)
            BaseRepoBranch: $(prBranchName)
            CommitMsg:      'Regenerate shard $(JobKey) (emitter $(emitterVersion))'
            AuthToken:      $(${{ parameters.ForkTokenVariableName }})

  - ${{ if parameters.CreatePullRequest }}:
    - job: CreatePR
      dependsOn: [Setup, RegenerateAndBuild]
      condition: succeededOrFailed()
      variables:
        emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
      steps:
        - checkout: self
          fetchDepth: 1
          fetchTags: false
          submodules: false
        - task: NodeTool@0
          inputs: { versionSpec: $(nodeVersion) }

        - bash: |
            node $(shardScript) create-pr \
              --sourceRepo     "$(Build.Repository.Name)" \
              --targetOwner    "$(targetOwner)" \
              --targetName     "$(targetName)" \
              --targetBranch   "${{ parameters.PullRequestTargetBranch }}" \
              --branch         "$(prBranchName)" \
              --buildId        "$(Build.BuildId)" \
              --emitterVersion "$(emitterVersion)" \
              --buildNumber    "$(Build.BuildNumber)" \
              --buildUrl       "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
              --definitionName "$(Build.DefinitionName)"
          displayName: 'Open pull request'
          env:
            FORK_TOKEN: $(${{ parameters.ForkTokenVariableName }})
