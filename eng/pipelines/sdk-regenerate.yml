# JS SDK TypeSpec Breaking Change Check Pipeline (ARM Only)
# Purpose: Validate that the latest emitter (@azure-tools/typespec-ts) doesn't break existing ARM SDK packages
# Flow: Fetch latest emitter version → update emitter-package.json → regenerate lock file
#       → clone latest azure-rest-api-specs (local spec source)
#       → TypeSpec-Project-Sync.ps1 + TypeSpec-Project-Generate.ps1 (concurrent)
#       → pnpm build (concurrent)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/emitter-package.json
      - eng/scripts/update-changelog-content.ps1
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - eng/emitter-package.json
      - eng/scripts/update-changelog-content.ps1
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches:
      include:
        - main

parameters:
  - name: EmitterVersion
    displayName: "Emitter version to test (use 'empty' or leave default for latest dev tag)"
    type: string
    default: 'empty'
  - name: MaxWorkers
    displayName: "Regenerate concurrent workers"
    type: number
    default: 2
  - name: BuildWorkers
    displayName: "Build concurrent workers"
    type: number
    default: 2
  - name: RegenerationJobCount
    displayName: "Matrix jobs for regeneration"
    type: number
    default: 10
  - name: MinimumPerJob
    displayName: "Minimum packages per matrix job"
    type: number
    default: 10
  - name: SkipBuild
    displayName: "Skip build verification"
    type: boolean
    default: false
  - name: QuickTest
    displayName: "Quick test mode (only first 3 valid packages: arm-alertprocessingrules, arm-alertrulerecommendations, arm-alertsmanagement). Overrides Package filter, Matrix jobs, Minimum per job."
    type: boolean
    default: false
  - name: PackageFilter
    displayName: "Package filter (wildcard, comma-separated). Ignored when Quick test mode is checked. 'arm-*' = all"
    type: string
    default: 'arm-*'
  - name: SpecRepoBranch
    displayName: "azure-rest-api-specs branch to clone"
    type: string
    default: 'main'
  - name: CreatePullRequest
    displayName: "Create PR with generated changes"
    type: boolean
    default: false
  - name: ChangePushMode
    displayName: "Changes included in PR commit"
    type: string
    default: 'all'
    values:
      - all
      - api-md
  - name: PullRequestTargetBranch
    displayName: "PR target branch"
    type: string
    default: 'main'
  - name: PullRequestBranch
    displayName: "PR source branch (empty = auto)"
    type: string
    default: ''
  - name: PullRequestRepoOwner
    displayName: "PR target repo OWNER (empty = same as source repo, e.g. 'wxl534' for fork)"
    type: string
    default: ''
  - name: PullRequestRepoName
    displayName: "PR target repo NAME (empty = same as source repo name)"
    type: string
    default: ''
  - name: ForkTokenVariableName
    displayName: "ADO secret variable name holding the GitHub PAT (only needed when pushing to a fork)"
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '22.x'

stages:
  - stage: BreakCheck
    displayName: 'TypeSpec emitter breaking-change check'
    jobs:
      - job: Setup
        displayName: 'Setup'
        steps:
          # Step 1: Install Node.js
          - task: NodeTool@0
            displayName: 'Step 1: Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          # Step 2: Resolve emitter version
          - script: |
              set -euo pipefail

              # Treat empty / common sentinel values ('empty', 'latest', 'auto', 'dev')
              # as "use the latest dev tag from npm", because the ADO manual-run UI
              # forces string params to be non-empty.
              RAW_INPUT='${{ parameters.EmitterVersion }}'
              NORMALIZED=$(echo "$RAW_INPUT" | tr '[:upper:]' '[:lower:]' | xargs)
              if [ -z "$NORMALIZED" ] || [ "$NORMALIZED" = "empty" ] || [ "$NORMALIZED" = "latest" ] || [ "$NORMALIZED" = "auto" ] || [ "$NORMALIZED" = "dev" ]; then
                EMITTER_VERSION=$(npm view @azure-tools/typespec-ts dist-tags.dev)
                if [ -z "$EMITTER_VERSION" ]; then
                  echo "##[error]npm view returned empty dev tag for @azure-tools/typespec-ts"
                  exit 1
                fi
                echo "Resolved from npm dev tag: $EMITTER_VERSION"
              else
                EMITTER_VERSION="$RAW_INPUT"
                echo "Using specified version: $EMITTER_VERSION"
              fi

              echo "##vso[task.setvariable variable=emitterVersion;isOutput=true]$EMITTER_VERSION"
            displayName: 'Step 2: Resolve emitter version'
            name: resolveVersion

      - job: GenerateMatrix
        displayName: 'Generate package matrix'
        dependsOn: Setup
        variables:
          ${{ if eq(parameters.QuickTest, true) }}:
            effJobCount: 3
            effMinPerJob: 1
            effFilter: 'arm-alertprocessingrules,arm-alertrulerecommendations,arm-alertsmanagement'
          ${{ else }}:
            effJobCount: ${{ parameters.RegenerationJobCount }}
            effMinPerJob: ${{ parameters.MinimumPerJob }}
            effFilter: ${{ parameters.PackageFilter }}
        steps:
          - task: PowerShell@2
            displayName: 'Build matrix (split + scan skipped)'
            name: generateMatrix
            inputs:
              pwsh: true
              filePath: ./eng/pipelines/scripts/build-regen-matrix.ps1
              workingDirectory: $(Build.SourcesDirectory)
              arguments: >
                -BuildSourcesDirectory "$(Build.SourcesDirectory)"
                -MatrixOutDir "$(Build.ArtifactStagingDirectory)/matrix"
                -JobCount $(effJobCount)
                -MinimumPerJob $(effMinPerJob)
                -DirectoryFilterPattern '$(effFilter)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish matrix artifacts'
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/matrix
              artifact: matrix_artifacts

      - job: RegenerateAndBuild
        displayName: 'RegenerateAndBuild'
        dependsOn:
          - Setup
          - GenerateMatrix
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.GenerateMatrix.outputs['generateMatrix.matrix'] ]
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - download: current
            displayName: 'Download matrix artifacts'
            artifact: matrix_artifacts

          - script: >
              bash ./eng/pipelines/scripts/prepare-regen-workspace.sh
              "$(sdkRoot)"
              "$(specRepoRoot)"
              "${{ parameters.SpecRepoBranch }}"
              "$(emitterVersion)"
            displayName: 'Prepare workspace (deps + specs + emitter)'

          # Step 3: Regenerate (shared TypeSpec scripts) → build (pnpm build) for this batch
          - script: |
              cd $(sdkRoot)
              mkdir -p "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
              node eng/pipelines/scripts/regenerate-runner.js \
                --specRepoRoot "$(specRepoRoot)" \
                --maxWorkers "${{ parameters.MaxWorkers }}" \
                --buildWorkers "${{ parameters.BuildWorkers }}" \
                --skipBuild "${{ parameters.SkipBuild }}" \
                --emitterVersion "$(emitterVersion)" \
                --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
                --resultOutputDir "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
            displayName: 'Regenerate & build ARM package batch'

          # Shows the per-batch diff; if CreatePullRequest is on, also writes
          # changes.patch (filtered by ChangePushMode) for the PR job to apply.
          - script: |
              cd $(sdkRoot)
              echo "===== Show generated changes ====="
              git diff --stat
              CREATE_PR="${{ parameters.CreatePullRequest }}"
              if [ "$CREATE_PR" = "True" ] || [ "$CREATE_PR" = "true" ]; then
                echo "===== Create patch for PR job ====="
                PATCH_FILE="$(Build.ArtifactStagingDirectory)/results/$(JobKey)/changes.patch"
                MODE="${{ parameters.ChangePushMode }}"
                if [ "$MODE" = "api-md" ]; then
                  git diff --binary -- ':(glob)sdk/**/review/*.api.md' ':(glob)sdk/**/CHANGELOG.md' > "$PATCH_FILE"
                else
                  git diff --binary -- sdk/ > "$PATCH_FILE"
                fi
                echo "Patch mode: $MODE"
                echo "Patch file: $PATCH_FILE"
                wc -l "$PATCH_FILE" || true
              fi
            displayName: 'Capture changes (diff + patch)'
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: 'Publish batch result'
            condition: always()
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/results/$(JobKey)
              artifact: regen_result_$(JobKey)

      - job: Summary
        displayName: 'Summarize matrix results'
        dependsOn:
          - Setup
          - RegenerateAndBuild
        condition: succeededOrFailed()
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - download: current
            displayName: 'Download result artifacts'

          - script: node ./eng/pipelines/scripts/aggregate-regeneration-results.js
            displayName: 'Aggregate regeneration results'
            env:
              PIPELINE_WORKSPACE: $(Pipeline.Workspace)
              BUILD_ARTIFACTSTAGINGDIRECTORY: $(Build.ArtifactStagingDirectory)
              EMITTER_VERSION: $(emitterVersion)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish aggregated summary'
            condition: always()
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/summary
              artifact: regen_summary

      - ${{ if parameters.CreatePullRequest }}:
        - job: CreatePR
          displayName: 'Create PR with generated changes'
          dependsOn:
            - Setup
            - Summary
          condition: succeeded()
          variables:
            emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
          steps:
            - checkout: self

            # Only request the org-level GitHub App token when we're NOT pushing to a fork
            # (otherwise the fork user's PAT is used and this template would needlessly
            # require Azure Key Vault access).
            - ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
              - template: /eng/common/pipelines/templates/steps/login-to-github.yml
                parameters:
                  TokenOwners:
                    - Azure

            - download: current
              displayName: 'Download result artifacts'

            - script: >
                bash ./eng/pipelines/scripts/prepare-regen-pr-branch.sh
                "$(Build.SourcesDirectory)"
                "$(Pipeline.Workspace)"
                "$(Build.Repository.Name)"
                "${{ parameters.PullRequestRepoOwner }}"
                "${{ parameters.PullRequestRepoName }}"
                "${{ parameters.PullRequestBranch }}"
                "${{ parameters.PullRequestTargetBranch }}"
                "${{ parameters.ChangePushMode }}"
                "$(Build.BuildId)"
              displayName: 'Apply patches and prepare branch'
              env:
                ${{ if ne(parameters.ForkTokenVariableName, '') }}:
                  FORK_TOKEN: $(${{ parameters.ForkTokenVariableName }})
                ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
                  GH_TOKEN_VAL: $(GH_TOKEN)

            - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
              parameters:
                BaseRepoBranch: $(PRBranchName)
                BaseRepoOwner: $(RepoOwner)
                TargetRepoOwner: $(RepoOwner)
                TargetRepoName: $(RepoNameOnly)
                CommitMsg: TypeSpec regeneration changes (${{ parameters.ChangePushMode }}) for emitter $(emitterVersion)
                PushArgs: --force
                WorkingDirectory: $(Build.SourcesDirectory)
                AuthToken: $(PushToken)

            - task: PowerShell@2
              displayName: 'Create pull request'
              condition: and(succeeded(), eq(variables['HasChanges'], 'true'))
              inputs:
                pwsh: true
                targetType: inline
                script: |
                  $ErrorActionPreference = 'Stop'
                  $aggPath = Join-Path '$(Pipeline.Workspace)' 'regen_summary/aggregated-results.json'
                  $failedLog = Join-Path '$(Pipeline.Workspace)' 'failed-patches.txt'
                  $bodyPath = Join-Path '$(Pipeline.Workspace)' 'regen-pr-body.md'
                  & ./eng/pipelines/scripts/format-regen-pr-body.ps1 `
                    -AggPath $aggPath `
                    -FailedLogPath $failedLog `
                    -BuildDefinitionName '$(Build.DefinitionName)' `
                    -BuildNumber '$(Build.BuildNumber)' `
                    -BuildResultsUrl '$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)' `
                    -EmitterVersion '$(emitterVersion)' `
                    -ChangePushMode '${{ parameters.ChangePushMode }}' `
                    -PullRequestTargetBranch '${{ parameters.PullRequestTargetBranch }}' `
                    -OutputPath $bodyPath

                  $bodyText = Get-Content $bodyPath -Raw
                  $prTitle  = 'TypeSpec regeneration: emitter $(emitterVersion) [${{ parameters.ChangePushMode }}]'
                  & ./eng/common/scripts/Submit-PullRequest.ps1 `
                    -RepoOwner '$(RepoOwner)' `
                    -RepoName '$(RepoNameOnly)' `
                    -BaseBranch '${{ parameters.PullRequestTargetBranch }}' `
                    -PROwner '$(RepoOwner)' `
                    -PRBranch '$(PRBranchName)' `
                    -AuthToken '$(PushToken)' `
                    -PRTitle $prTitle `
                    -PRBody $bodyText
