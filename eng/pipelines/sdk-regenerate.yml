# JS SDK TypeSpec breaking-change check pipeline (ARM only).
#
# Flow: resolve emitter dev tag → patch eng/emitter-package.json + regenerate
# lock file → shard ARM packages with the shared New-RegenerateMatrix.ps1 →
# per shard run eng/pipelines/scripts/regenerate-shard.js, which delegates
# every per-package step to shared scripts (TypeSpec-Project-Sync.ps1,
# TypeSpec-Project-Generate.ps1, update-changelog-content.ps1) and a single
# `pnpm turbo build --filter` invocation. Summary stage aggregates per-shard
# result.json; optional CreatePR stage 3-way applies the per-shard
# changes.patch artifacts and pushes via the shared git-push-changes template.

trigger:
  branches:
    include: [main]
  paths:
    include:
      - eng/emitter-package.json
      - eng/scripts/update-changelog-content.ps1
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

pr:
  branches:
    include: [main, feature/*, hotfix/*]
  paths:
    include:
      - eng/emitter-package.json
      - eng/scripts/update-changelog-content.ps1
      - eng/common/scripts/TypeSpec-*
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/**

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches: { include: [main] }

parameters:
  - name: EmitterVersion
    displayName: "Emitter version (default 'empty' = latest dev tag)"
    type: string
    default: 'empty'
  - name: MaxWorkers
    displayName: "Per-shard regen concurrency"
    type: number
    default: 2
  - name: BuildConcurrency
    displayName: "pnpm turbo --concurrency per shard"
    type: number
    default: 2
  - name: RegenerationJobCount
    displayName: "Matrix shard count"
    type: number
    default: 10
  - name: MinimumPerJob
    displayName: "Minimum packages per shard"
    type: number
    default: 10
  - name: SkipBuild
    type: boolean
    default: false
  - name: QuickTest
    displayName: "Quick test (only 3 small ARM packages, 1 shard; overrides PackageFilter / matrix sizing)"
    type: boolean
    default: false
  - name: PackageFilter
    displayName: "Package filter (comma-separated wildcards; 'arm-*' = all)"
    type: string
    default: 'arm-*'
  - name: SpecRepoBranch
    type: string
    default: 'main'
  - name: CreatePullRequest
    type: boolean
    default: false
  - name: ChangePushMode
    displayName: "Changes pushed in PR ('all' or 'api-md')"
    type: string
    default: 'all'
    values: [all, api-md]
  - name: PullRequestTargetBranch
    type: string
    default: 'main'
  - name: PullRequestBranch
    displayName: "PR source branch (empty = auto)"
    type: string
    default: ''
  - name: PullRequestRepoOwner
    displayName: "PR target repo OWNER (empty = same as source; e.g. 'wxl534' to PR to a fork)"
    type: string
    default: ''
  - name: PullRequestRepoName
    displayName: "PR target repo NAME (empty = same as source repo name)"
    type: string
    default: ''
  - name: ForkTokenVariableName
    displayName: "ADO secret variable holding the GitHub PAT (required when targeting a fork)"
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '22.x'

stages:
- stage: SDKRegenerate
  displayName: 'TypeSpec emitter breaking-change check'
  jobs:

  # ----- Setup: resolve emitter version + bake emitter-package(-lock).json -----
  - job: Setup
    steps:
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - bash: |
          set -euo pipefail
          raw='${{ parameters.EmitterVersion }}'
          norm=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | xargs)
          if [[ -z "$norm" || "$norm" == "empty" || "$norm" == "latest" || "$norm" == "auto" || "$norm" == "dev" ]]; then
            v=$(npm view @azure-tools/typespec-ts dist-tags.dev)
            [[ -n "$v" ]] || { echo "##[error]npm view returned empty dev tag"; exit 1; }
          else
            v="$raw"
          fi
          echo "Emitter version: $v"
          echo "##vso[task.setvariable variable=emitterVersion;isOutput=true]$v"
        name: resolveVersion
        displayName: 'Resolve emitter version'

  # ----- GenerateMatrix: shared shared matrix builder (only TypeSpec packages) -----
  - job: GenerateMatrix
    dependsOn: Setup
    variables:
      ${{ if parameters.QuickTest }}:
        effFilter: 'arm-alertprocessingrules,arm-alertrulerecommendations,arm-alertsmanagement'
        effJobCount: 1
        effMinPerJob: 1
      ${{ else }}:
        effFilter: ${{ parameters.PackageFilter }}
        effJobCount: ${{ parameters.RegenerationJobCount }}
        effMinPerJob: ${{ parameters.MinimumPerJob }}
    steps:
      - task: PowerShell@2
        name: generateMatrix
        displayName: 'Build matrix'
        inputs:
          pwsh: true
          targetType: inline
          script: |
            & $(Build.SourcesDirectory)/eng/common/scripts/New-RegenerateMatrix.ps1 `
              -OutputDirectory $(Build.ArtifactStagingDirectory)/matrix `
              -OutputVariableName matrix `
              -JobCount $(effJobCount) `
              -MinimumPerJob $(effMinPerJob) `
              -OnlyTypeSpec true `
              -DirectoryFilterPattern '$(effFilter)'
            if ($LASTEXITCODE) { exit $LASTEXITCODE }
      - publish: $(Build.ArtifactStagingDirectory)/matrix
        artifact: matrix_artifacts

  # ----- Regenerate & build per shard -----
  - job: RegenerateAndBuild
    dependsOn: [Setup, GenerateMatrix]
    timeoutInMinutes: 180
    strategy:
      matrix: $[ dependencies.GenerateMatrix.outputs['generateMatrix.matrix'] ]
    variables:
      emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
    steps:
      - task: NodeTool@0
        inputs: { versionSpec: $(nodeVersion) }
      - download: current
        artifact: matrix_artifacts

      # Patch eng/emitter-package.json with the resolved emitter version and
      # regenerate eng/emitter-package-lock.json so TypeSpec-Project-Generate
      # uses the candidate emitter.
      - bash: |
          set -euo pipefail
          npm install -g @azure-tools/typespec-client-generator-cli pnpm
          node -e '
            const fs=require("fs"),p="$(sdkRoot)/eng/emitter-package.json";
            const j=JSON.parse(fs.readFileSync(p,"utf8"));
            j.dependencies["@azure-tools/typespec-ts"]="$(emitterVersion)";
            fs.writeFileSync(p,JSON.stringify(j,null,2)+"\n");'
          cd "$(sdkRoot)"
          tsp-client generate-lock-file --npm-args="--legacy-peer-deps"

          # Shallow-clone the spec repo once per shard (TypeSpec-Project-Sync
          # will copy from this via -LocalSpecRepoPath).
          git clone --depth 1 --branch "${{ parameters.SpecRepoBranch }}" \
            https://github.com/Azure/azure-rest-api-specs.git "$(specRepoRoot)"
        displayName: 'Prepare emitter + spec repo'

      - bash: |
          set -euo pipefail
          mkdir -p "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
          node $(sdkRoot)/eng/pipelines/scripts/regenerate-shard.js \
            --specRepoRoot "$(specRepoRoot)" \
            --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
            --resultOutputDir "$(Build.ArtifactStagingDirectory)/results/$(JobKey)" \
            --maxWorkers "${{ parameters.MaxWorkers }}" \
            --buildConcurrency "${{ parameters.BuildConcurrency }}" \
            --skipBuild "${{ parameters.SkipBuild }}"
        displayName: 'Regenerate + build shard'
        workingDirectory: $(sdkRoot)

      - bash: |
          set -euo pipefail
          cd "$(sdkRoot)"
          echo "===== Generated changes ====="; git diff --stat
          if [[ "${{ parameters.CreatePullRequest }}" == "True" || "${{ parameters.CreatePullRequest }}" == "true" ]]; then
            out="$(Build.ArtifactStagingDirectory)/results/$(JobKey)/changes.patch"
            if [[ "${{ parameters.ChangePushMode }}" == "api-md" ]]; then
              git diff --binary -- ':(glob)sdk/**/review/*.api.md' ':(glob)sdk/**/CHANGELOG.md' > "$out"
            else
              git diff --binary -- sdk/ > "$out"
            fi
          fi
        displayName: 'Capture shard diff/patch'
        condition: always()

      - publish: $(Build.ArtifactStagingDirectory)/results/$(JobKey)
        artifact: regen_result_$(JobKey)
        condition: always()

  # ----- Summary: aggregate per-shard result.json -----
  - job: Summary
    dependsOn: [Setup, RegenerateAndBuild]
    condition: succeededOrFailed()
    variables:
      emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
    steps:
      - download: current
      - task: PowerShell@2
        displayName: 'Aggregate shard results'
        inputs:
          pwsh: true
          targetType: inline
          script: |
            $files = Get-ChildItem -Path '$(Pipeline.Workspace)' -Recurse -Filter 'result.json' -ErrorAction SilentlyContinue
            $agg = [pscustomobject]@{
              emitterVersion = '$(emitterVersion)'
              regeneration   = @{ total=0; success=0; failed=0; failures=@() }
              build          = @{ total=0; success=0; failed=0; failures=@() }
              changelog      = @{ total=0; generated=0; failed=@(); withBreaking=0; breakingPackages=@() }
            }
            foreach ($f in $files) {
              $r = Get-Content $f.FullName -Raw | ConvertFrom-Json
              if ($r.regeneration) {
                $agg.regeneration.total   += $r.regeneration.total
                $agg.regeneration.success += $r.regeneration.success
                $agg.regeneration.failed  += $r.regeneration.failed
                $agg.regeneration.failures += $r.regeneration.failures
              }
              if ($r.build) {
                $agg.build.total   += $r.build.total
                $agg.build.success += $r.build.success
                $agg.build.failed  += $r.build.failed
                $agg.build.failures += $r.build.failures
              }
              if ($r.changelog) {
                $agg.changelog.total            += $r.changelog.total
                $agg.changelog.generated        += $r.changelog.generated
                $agg.changelog.failed           += $r.changelog.failed
                $agg.changelog.withBreaking     += $r.changelog.withBreaking
                $agg.changelog.breakingPackages += $r.changelog.breakingPackages
              }
            }
            $agg.changelog.breakingPackages = $agg.changelog.breakingPackages | Sort-Object -Unique
            Write-Host "===== AGGREGATED SUMMARY ====="
            Write-Host ("Emitter      : {0}" -f $agg.emitterVersion)
            Write-Host ("Regenerated  : {0}/{1}  (failed: {2})" -f $agg.regeneration.success, $agg.regeneration.total, $agg.regeneration.failed)
            Write-Host ("Built        : {0}/{1}  (failed: {2})" -f $agg.build.success, $agg.build.total, $agg.build.failed)
            Write-Host ("Changelogs   : {0}/{1}  (breaking: {2})" -f $agg.changelog.generated, $agg.changelog.total, $agg.changelog.withBreaking)
            if ($agg.changelog.breakingPackages.Count -gt 0) {
              Write-Host "`nBreaking packages:"
              $agg.changelog.breakingPackages | ForEach-Object { Write-Host "  - $_" }
            }
            New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/summary' | Out-Null
            $agg | ConvertTo-Json -Depth 6 | Set-Content '$(Build.ArtifactStagingDirectory)/summary/aggregated-results.json'
            if ($agg.regeneration.failed -gt 0 -or $agg.build.failed -gt 0) { exit 1 }
      - publish: $(Build.ArtifactStagingDirectory)/summary
        artifact: regen_summary
        condition: always()

  # ----- Optional CreatePR: 3-way apply per-shard patches and open PR -----
  - ${{ if parameters.CreatePullRequest }}:
    - job: CreatePR
      dependsOn: [Setup, Summary]
      condition: succeeded()
      variables:
        emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
      steps:
        - checkout: self
        # Only request the org-level GitHub App token when we're NOT targeting a fork.
        # When targeting a fork, the user's PAT (FORK_TOKEN env) is used instead.
        - ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
          - template: /eng/common/pipelines/templates/steps/login-to-github.yml
            parameters:
              TokenOwners: [Azure]
        - download: current

        - bash: |
            set -euo pipefail
            cd "$(sdkRoot)"

            # Source repo (where the build was triggered from); GitHub provides "owner/name".
            full='$(Build.Repository.Name)'
            src_owner="${full%%/*}"
            src_name="${full##*/}"

            # Target repo for the PR — override owner/name to push to a fork.
            target_owner='${{ parameters.PullRequestRepoOwner }}'
            target_name='${{ parameters.PullRequestRepoName }}'
            [[ -z "$target_owner" ]] && target_owner="$src_owner"
            [[ -z "$target_name"  ]] && target_name="$src_name"

            is_fork="false"
            if [[ "$target_owner" != "$src_owner" || "$target_name" != "$src_name" ]]; then
              is_fork="true"
            fi

            # Pick the push/PR token.
            if [[ "$is_fork" == "true" ]]; then
              push_token="${FORK_TOKEN:-}"
              if [[ -z "$push_token" ]]; then
                echo "##[error]Targeting fork ${target_owner}/${target_name} but no PAT was provided. Set ForkTokenVariableName to an ADO secret variable holding a GitHub PAT (repo scope)."
                exit 1
              fi
              echo "Targeting fork: ${target_owner}/${target_name} (using user PAT)"
            else
              push_token="${GH_TOKEN_VAL:-}"
              echo "Targeting source repo: ${target_owner}/${target_name} (using GH App token)"
            fi

            branch='${{ parameters.PullRequestBranch }}'
            blc=$(echo "$branch" | tr '[:upper:]' '[:lower:]')
            if [[ -z "$branch" || "$blc" == "empty" || "$blc" == "auto" ]]; then
              branch="sdk-regenerate-$(Build.BuildId)"
            fi

            # 3-way apply each shard's patch on top of the target branch.
            git remote set-url origin "https://x-access-token:${push_token}@github.com/${target_owner}/${target_name}.git"
            git fetch origin "${{ parameters.PullRequestTargetBranch }}" --depth=1
            git checkout -B "$branch" "FETCH_HEAD"

            failed='$(Pipeline.Workspace)/failed-patches.txt'
            : > "$failed"
            mapfile -t patches < <(find '$(Pipeline.Workspace)' -type f -name changes.patch | sort)
            for p in "${patches[@]}"; do
              [[ -s "$p" ]] || continue
              echo "Applying $p"
              if ! git apply --3way "$p"; then
                conflicts=$(git diff --name-only --diff-filter=U)
                while IFS= read -r f; do
                  [[ -z "$f" ]] && continue
                  git checkout HEAD -- "$f" 2>/dev/null || git rm -f "$f" 2>/dev/null || true
                  echo "$f" >> "$failed"
                done <<< "$conflicts"
              fi
            done
            # Never push the temporary emitter patches.
            git checkout -- eng/emitter-package.json eng/emitter-package-lock.json 2>/dev/null || true

            echo "##vso[task.setvariable variable=PRBranchName]$branch"
            echo "##vso[task.setvariable variable=TargetRepoOwner]$target_owner"
            echo "##vso[task.setvariable variable=TargetRepoName]$target_name"
            echo "##vso[task.setvariable variable=PushToken;issecret=true]$push_token"
          displayName: 'Apply shard patches'
          env:
            ${{ if ne(parameters.ForkTokenVariableName, '') }}:
              FORK_TOKEN: $(${{ parameters.ForkTokenVariableName }})
            ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
              GH_TOKEN_VAL: $(GH_TOKEN)

        - template: /eng/common/pipelines/templates/steps/git-push-changes.yml
          parameters:
            BaseRepoBranch: $(PRBranchName)
            BaseRepoOwner: $(TargetRepoOwner)
            TargetRepoOwner: $(TargetRepoOwner)
            TargetRepoName: $(TargetRepoName)
            CommitMsg: 'TypeSpec regeneration (${{ parameters.ChangePushMode }}) for emitter $(emitterVersion)'
            PushArgs: --force
            WorkingDirectory: $(sdkRoot)
            AuthToken: $(PushToken)

        - task: PowerShell@2
          displayName: 'Create pull request'
          condition: and(succeeded(), eq(variables['HasChanges'], 'true'))
          inputs:
            pwsh: true
            targetType: inline
            script: |
              $agg = Get-Content '$(Pipeline.Workspace)/regen_summary/aggregated-results.json' -Raw | ConvertFrom-Json
              $failed = Join-Path '$(Pipeline.Workspace)' 'failed-patches.txt'
              $body = New-Object System.Collections.Generic.List[string]
              $body.Add("Generated by ``$(Build.DefinitionName)`` build [$(Build.BuildNumber)]($(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)).")
              $body.Add("Emitter version: ``$(emitterVersion)``. Push mode: ``${{ parameters.ChangePushMode }}``.")
              $body.Add("")
              $body.Add("## Regeneration summary")
              $body.Add("- Regenerated: **$($agg.regeneration.success)/$($agg.regeneration.total)**")
              $body.Add("- Built OK:    **$($agg.build.success)/$($agg.build.total)**")
              $body.Add("- Changelog generated: **$($agg.changelog.generated)/$($agg.changelog.total)**")
              $body.Add("- Packages with breaking changes: **$($agg.changelog.withBreaking)**")
              if ($agg.changelog.breakingPackages.Count -gt 0) {
                $body.Add("")
                $body.Add("## Packages with breaking changes ($($agg.changelog.breakingPackages.Count))")
                foreach ($p in $agg.changelog.breakingPackages) { $body.Add("- ``$p``") }
              }
              if (Test-Path $failed) {
                $entries = Get-Content $failed | Where-Object { $_.Trim().Length -gt 0 }
                if ($entries.Count -gt 0) {
                  $body.Add("")
                  $body.Add("## Files dropped due to upstream conflicts ($($entries.Count))")
                  foreach ($e in $entries) { $body.Add("- ``$e``") }
                }
              }
              & '$(sdkRoot)/eng/common/scripts/Submit-PullRequest.ps1' `
                -RepoOwner '$(TargetRepoOwner)' -RepoName '$(TargetRepoName)' `
                -BaseBranch '${{ parameters.PullRequestTargetBranch }}' `
                -PROwner '$(TargetRepoOwner)' -PRBranch '$(PRBranchName)' `
                -AuthToken '$(PushToken)' `
                -PRTitle "TypeSpec regeneration: emitter $(emitterVersion) [${{ parameters.ChangePushMode }}]" `
                -PRBody ($body -join "`n")
