# eng/pipelines/sdk-regenerate.yml
# JS SDK TypeSpec Breaking Change Check Pipeline (ARM Only)
# Purpose: Validate that the latest emitter (@azure-tools/typespec-ts) doesn't break existing ARM SDK packages
# Flow: Fetch latest emitter version → update emitter-package.json → regenerate lock file
#       → clone latest azure-rest-api-specs (local spec source)
#       → tsp-client init --update-if-exists -c <local-tspconfig.yaml> --local-spec-repo (concurrent)
#       → pnpm build (concurrent)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/regenerate-runner.js
      - eng/pipelines/scripts/breaking-change-detector.js

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/sdk-regenerate.yml
      - eng/pipelines/scripts/regenerate-runner.js
      - eng/pipelines/scripts/breaking-change-detector.js

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches:
      include:
        - main

parameters:
  - name: EmitterVersion
    displayName: "Emitter version to test (use 'empty' or leave default for latest dev tag)"
    type: string
    default: 'empty'
  - name: MaxWorkers
    displayName: "Regenerate concurrent workers"
    type: number
    default: 2
  - name: BuildWorkers
    displayName: "Build concurrent workers"
    type: number
    default: 2
  - name: RegenerationJobCount
    displayName: "Matrix jobs for regeneration"
    type: number
    default: 10
  - name: MinimumPerJob
    displayName: "Minimum packages per matrix job"
    type: number
    default: 10
  - name: SkipBuild
    displayName: "Skip build verification"
    type: boolean
    default: false
  - name: SpecRepoBranch
    displayName: "azure-rest-api-specs branch to clone"
    type: string
    default: 'main'
  - name: CreatePullRequest
    displayName: "Create PR with generated changes"
    type: boolean
    default: false
  - name: ChangePushMode
    displayName: "Changes included in PR commit"
    type: string
    default: 'all'
    values:
      - all
      - api-md
  - name: PullRequestTargetBranch
    displayName: "PR target branch"
    type: string
    default: 'main'
  - name: PullRequestBranch
    displayName: "PR source branch (empty = auto)"
    type: string
    default: ''
  - name: PullRequestRepoOwner
    displayName: "PR target repo OWNER (empty = same as source repo, e.g. 'wxl534' for fork)"
    type: string
    default: ''
  - name: PullRequestRepoName
    displayName: "PR target repo NAME (empty = same as source repo name)"
    type: string
    default: ''
  - name: ForkTokenVariableName
    displayName: "ADO secret variable name holding the GitHub PAT (only needed when pushing to a fork)"
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '22.x'

stages:
  - stage: BreakCheck
    displayName: 'TypeSpec emitter breaking-change check'
    jobs:
      - job: Setup
        displayName: 'Setup'
        steps:
          # Step 1: Install Node.js
          - task: NodeTool@0
            displayName: 'Step 1: Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          # Step 2: Resolve emitter version
          - script: |
              set -euo pipefail

              # Treat empty / common sentinel values ('empty', 'latest', 'auto', 'dev')
              # as "use the latest dev tag from npm", because the ADO manual-run UI
              # forces string params to be non-empty.
              RAW_INPUT='${{ parameters.EmitterVersion }}'
              NORMALIZED=$(echo "$RAW_INPUT" | tr '[:upper:]' '[:lower:]' | xargs)
              if [ -z "$NORMALIZED" ] || [ "$NORMALIZED" = "empty" ] || [ "$NORMALIZED" = "latest" ] || [ "$NORMALIZED" = "auto" ] || [ "$NORMALIZED" = "dev" ]; then
                EMITTER_VERSION=$(npm view @azure-tools/typespec-ts dist-tags.dev)
                if [ -z "$EMITTER_VERSION" ]; then
                  echo "##[error]npm view returned empty dev tag for @azure-tools/typespec-ts"
                  exit 1
                fi
                echo "Resolved from npm dev tag: $EMITTER_VERSION"
              else
                EMITTER_VERSION="$RAW_INPUT"
                echo "Using specified version: $EMITTER_VERSION"
              fi

              echo "##vso[task.setvariable variable=emitterVersion;isOutput=true]$EMITTER_VERSION"
            displayName: 'Step 2: Resolve emitter version'
            name: resolveVersion

      - job: GenerateMatrix
        displayName: 'Generate package matrix'
        dependsOn: Setup
        steps:
          - task: PowerShell@2
            displayName: 'Split ARM packages into matrix batches'
            name: generateMatrix
            inputs:
              pwsh: true
              filePath: ./eng/common/scripts/New-RegenerateMatrix.ps1
              arguments: >
                -OutputDirectory "$(Build.ArtifactStagingDirectory)/matrix"
                -OutputVariableName matrix
                -JobCount ${{ parameters.RegenerationJobCount }}
                -MinimumPerJob ${{ parameters.MinimumPerJob }}
                -OnlyTypeSpec true
                -DirectoryFilterPattern 'arm-*'
              workingDirectory: $(Build.SourcesDirectory)

          - task: PowerShell@2
            displayName: 'Scan ARM packages without tsp-location.yaml'
            inputs:
              pwsh: true
              targetType: inline
              # Mirror of the matrix filter (`-OnlyTypeSpec true`): the matrix
              # step keeps only arm-* dirs that have tsp-location.yaml; here we
              # record the ones that were filtered OUT, so the Summary stage
              # can list them in the PR description for on-boarding follow-up.
              script: |
                $srcRoot = "$(Build.SourcesDirectory)"
                $sdkDir = Join-Path $srcRoot 'sdk'
                $missing = @()
                if (Test-Path $sdkDir) {
                  Get-ChildItem -Path $sdkDir -Directory -Recurse -Filter 'arm-*' -ErrorAction SilentlyContinue |
                    ForEach-Object {
                      $tspLoc = Join-Path $_.FullName 'tsp-location.yaml'
                      if (-not (Test-Path $tspLoc)) {
                        $relative = ($_.FullName.Substring($srcRoot.Length + 1)) -replace '\\','/'
                        $missing += @{ name = $relative; reason = 'no tsp-location.yaml' }
                      }
                    }
                }
                $outPath = Join-Path "$(Build.ArtifactStagingDirectory)/matrix" 'skipped-no-tsp-location.json'
                New-Item -ItemType Directory -Force -Path (Split-Path $outPath) | Out-Null
                ConvertTo-Json @($missing) -Depth 3 | Out-File -FilePath $outPath -Encoding utf8
                Write-Host "Wrote $($missing.Count) skipped packages to $outPath"
              workingDirectory: $(Build.SourcesDirectory)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish matrix artifacts'
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/matrix
              artifact: matrix_artifacts

      - job: RegenerateAndBuild
        displayName: 'RegenerateAndBuild'
        dependsOn:
          - Setup
          - GenerateMatrix
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.GenerateMatrix.outputs['generateMatrix.matrix'] ]
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              npm install -g @azure-tools/typespec-client-generator-cli
              npm install -g pnpm
              npm config set legacy-peer-deps true
            displayName: 'Install tsp-client and pnpm'

          - download: current
            displayName: 'Download matrix artifacts'
            artifact: matrix_artifacts

          # Clone azure-rest-api-specs (latest main, shallow).
          # tsp-client init --local-spec-repo only needs the current state of
          # the spec repo, so a depth=1 shallow clone is enough and saves
          # 5-10 minutes vs a full clone.
          - script: |
              set -euo pipefail
              if [ -d "$(specRepoRoot)/.git" ]; then
                echo "Spec repo already exists at $(specRepoRoot), pulling latest..."
                cd $(specRepoRoot)
                git fetch origin ${{ parameters.SpecRepoBranch }} --depth 1
                git checkout ${{ parameters.SpecRepoBranch }}
                git reset --hard origin/${{ parameters.SpecRepoBranch }}
              else
                echo "Cloning azure-rest-api-specs (branch ${{ parameters.SpecRepoBranch }}, shallow)..."
                git clone --depth 1 --branch ${{ parameters.SpecRepoBranch }} \
                  https://github.com/Azure/azure-rest-api-specs.git $(specRepoRoot)
              fi
              echo "Spec repo ready at $(specRepoRoot)"
              cd $(specRepoRoot) && git log -1 --oneline
            displayName: 'Clone azure-rest-api-specs (local spec source)'

          # Update emitter-package.json + lock file
          - script: |
              cd $(sdkRoot)
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('eng/emitter-package.json', 'utf8'));
                pkg.dependencies['@azure-tools/typespec-ts'] = '$(emitterVersion)';
                fs.writeFileSync('eng/emitter-package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              cd eng
              cp emitter-package.json package.json
              npm install --package-lock-only --ignore-scripts 2>/dev/null
              if [ -f package-lock.json ]; then
                cp package-lock.json emitter-package-lock.json
                rm -f package.json package-lock.json
                rm -rf node_modules
              fi
            displayName: 'Update emitter + lock file'

          # Step 3: Regenerate (tsp-client init) → build (pnpm build) for this batch
          - script: |
              cd $(sdkRoot)
              mkdir -p "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
              node eng/pipelines/scripts/regenerate-runner.js \
                --specRepoRoot "$(specRepoRoot)" \
                --maxWorkers "${{ parameters.MaxWorkers }}" \
                --buildWorkers "${{ parameters.BuildWorkers }}" \
                --skipBuild "${{ parameters.SkipBuild }}" \
                --emitterVersion "$(emitterVersion)" \
                --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
                --resultOutputDir "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
            displayName: 'Regenerate & build ARM package batch'

          - script: |
              cd $(sdkRoot)
              PATCH_FILE="$(Build.ArtifactStagingDirectory)/results/$(JobKey)/changes.patch"
              MODE="${{ parameters.ChangePushMode }}"
              if [ "$MODE" = "api-md" ]; then
                git diff --binary -- ':(glob)sdk/**/review/*.api.md' > "$PATCH_FILE"
              else
                git diff --binary -- sdk/ > "$PATCH_FILE"
              fi
              echo "Patch mode: $MODE"
              echo "Patch file: $PATCH_FILE"
              wc -l "$PATCH_FILE" || true
            displayName: 'Create patch for PR job'
            condition: and(always(), ${{ parameters.CreatePullRequest }})

          - script: |
              cd $(sdkRoot)
              git diff --stat
            displayName: 'Show generated changes'
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: 'Publish batch result'
            condition: always()
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/results/$(JobKey)
              artifact: regen_result_$(JobKey)

      - job: Summary
        displayName: 'Summarize matrix results'
        dependsOn:
          - Setup
          - RegenerateAndBuild
        condition: succeededOrFailed()
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - download: current
            displayName: 'Download result artifacts'

          - script: |
              node - <<'NODE'
              const fs = require("fs");
              const path = require("path");

              const root = process.env.PIPELINE_WORKSPACE;
              const resultFiles = [];
              (function walk(dir) {
                if (!fs.existsSync(dir)) return;
                for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                  const full = path.join(dir, e.name);
                  if (e.isDirectory()) walk(full);
                  else if (e.name === "result.json") resultFiles.push(full);
                }
              })(root);

              const t = {
                packages: 0,
                regen:     { total: 0, success: 0, failed: 0, failures: [] },
                build:     { total: 0, success: 0, failed: 0, failures: [] },
                changelog: { total: 0, generated: 0, failed: 0, withChanges: 0, withBreaking: 0, breakingPackages: [], failedPackages: [] },
                skippedNoTspLocation: [],
              };
              const addNums = (dst, src, keys) => { if (src) for (const k of keys) dst[k] += src[k] ?? 0; };

              for (const file of resultFiles) {
                const r = JSON.parse(fs.readFileSync(file, "utf8"));
                t.packages += r.packages?.length ?? 0;
                addNums(t.regen,     r.regeneration, ["total","success","failed"]);
                addNums(t.build,     r.build,        ["total","success","failed"]);
                addNums(t.changelog, r.changelog,    ["total","generated","failed","withChanges","withBreaking"]);
                t.regen.failures.push(...(r.regeneration?.failures ?? []));
                t.build.failures.push(...(r.build?.failures ?? []));
                t.changelog.breakingPackages.push(...(r.changelog?.breakingPackages ?? []));
                t.changelog.failedPackages.push(...(r.changelog?.failedPackages ?? []));
                if (Array.isArray(r.skippedNoTspLocation)) t.skippedNoTspLocation.push(...r.skippedNoTspLocation);
              }

              // Setup-stage scan catches arm-* dirs filtered out before matrix (no tsp-location.yaml).
              const setupSkipped = path.join(root, "matrix_artifacts", "skipped-no-tsp-location.json");
              if (fs.existsSync(setupSkipped)) {
                try {
                  const arr = JSON.parse(fs.readFileSync(setupSkipped, "utf8"));
                  if (Array.isArray(arr)) t.skippedNoTspLocation.push(...arr);
                } catch (err) { console.log(`Warning: ${err.message}`); }
              }

              // Dedup + sort lists once, reuse for console + aggregated JSON.
              const skipMap = new Map();
              for (const it of t.skippedNoTspLocation) if (!skipMap.has(it.name)) skipMap.set(it.name, it.reason);
              const skipped  = [...skipMap.entries()].sort(([a],[b]) => a.localeCompare(b)).map(([name, reason]) => ({ name, reason }));
              const breaking = [...new Set(t.changelog.breakingPackages)].sort();
              const cgFailed = [...new Set(t.changelog.failedPackages)].sort();
              const pct = (n, d) => d === 0 ? "0.0" : (n * 100 / d).toFixed(1);

              console.log("========== MATRIX SUMMARY ==========");
              console.log(`Result files: ${resultFiles.length} | Packages: ${t.packages}`);
              console.log(`Regen:     ${t.regen.success}/${t.regen.total} OK (${pct(t.regen.success, t.regen.total)}%) | Failed: ${t.regen.failed}`);
              console.log(`Build:     ${t.build.success}/${t.build.total} OK (${pct(t.build.success, t.build.total)}%) | Failed: ${t.build.failed}`);
              console.log(`Changelog: ${t.changelog.generated}/${t.changelog.total} OK | Changes: ${t.changelog.withChanges} | Breaking: ${t.changelog.withBreaking} | Failed: ${t.changelog.failed}`);

              const printList = (title, items, fmt = x => x) => {
                if (!items.length) return;
                console.log(`\n${title} (${items.length}):`);
                for (const it of items) console.log(`  - ${fmt(it)}`);
              };
              printList("Breaking changes (see CHANGELOG.md in PR diff)", breaking);
              printList("Changelog tool failures (see logs/changelog/<pkg>.log)", cgFailed);
              printList("Skipped — no tsp-location.yaml (filtered by matrix gen)", skipped, ({ name, reason }) => `${name} (${reason})`);
              printList("Regen failures", t.regen.failures, f => `${f.pkg}: ${f.error}`);
              printList("Build failures", t.build.failures, f => `${f.pkg} (${f.phase}): ${f.error}`);
              console.log("====================================");

              const aggregated = {
                emitterVersion: process.env.EMITTER_VERSION || null,
                regeneration: { total: t.regen.total, success: t.regen.success, failed: t.regen.failed },
                build:        { total: t.build.total, success: t.build.success, failed: t.build.failed },
                changelog: {
                  total: t.changelog.total, generated: t.changelog.generated, failed: t.changelog.failed,
                  withChanges: t.changelog.withChanges, withBreaking: t.changelog.withBreaking,
                  breakingPackages: breaking, failedPackages: cgFailed,
                },
                skippedNoTspLocation: skipped,
              };
              const outDir = path.join(process.env.BUILD_ARTIFACTSTAGINGDIRECTORY || ".", "summary");
              fs.mkdirSync(outDir, { recursive: true });
              fs.writeFileSync(path.join(outDir, "aggregated-results.json"), JSON.stringify(aggregated, null, 2));
              console.log(`Wrote aggregated-results.json (${skipped.length} skipped, ${breaking.length} breaking)`);

              if (resultFiles.length === 0 || t.regen.failed > 0 || t.build.failed > 0) process.exit(1);
              NODE
            displayName: 'Aggregate regeneration results'
            env:
              EMITTER_VERSION: $(emitterVersion)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish aggregated summary'
            condition: always()
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/summary
              artifact: regen_summary

      - ${{ if parameters.CreatePullRequest }}:
        - job: CreatePR
          displayName: 'Create PR with generated changes'
          dependsOn:
            - Setup
            - Summary
          condition: succeeded()
          variables:
            emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
          steps:
            - checkout: self

            # Only request the org-level GitHub App token when we're NOT pushing to a fork
            # (otherwise the fork user's PAT is used and this template would needlessly
            # require Azure Key Vault access).
            - ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
              - template: /eng/common/pipelines/templates/steps/login-to-github.yml
                parameters:
                  TokenOwners:
                    - Azure

            - download: current
              displayName: 'Download result artifacts'

            - script: |
                set -euo pipefail
                cd $(Build.SourcesDirectory)

                # Determine target repo (defaults to the source repo when no fork override)
                overrideOwner='${{ parameters.PullRequestRepoOwner }}'
                overrideName='${{ parameters.PullRequestRepoName }}'

                sourceRepoFull="$(Build.Repository.Name)"
                if [[ "$sourceRepoFull" == */* ]]; then
                  srcOwner="${sourceRepoFull%%/*}"
                  srcName="${sourceRepoFull##*/}"
                else
                  srcOwner="Azure"
                  srcName="$sourceRepoFull"
                fi

                repoOwner="${overrideOwner:-$srcOwner}"
                repoName="${overrideName:-$srcName}"
                isFork="false"
                if [ "$repoOwner" != "$srcOwner" ] || [ "$repoName" != "$srcName" ]; then
                  isFork="true"
                fi

                # Resolve the token to use for pushing.
                # FORK_TOKEN / GH_TOKEN_VAL are injected via the env: block below so
                # that ADO can correctly substitute secret variables at runtime.
                if [ "$isFork" = "true" ]; then
                  pushToken="${FORK_TOKEN:-}"
                  if [ -z "$pushToken" ]; then
                    echo "ERROR: Pushing to fork ${repoOwner}/${repoName} but no fork PAT was provided."
                    echo "Set parameter ForkTokenVariableName to the name of an ADO secret variable containing a GitHub PAT with repo scope,"
                    echo "and make sure that secret variable actually exists in this pipeline."
                    exit 1
                  fi
                  echo "Pushing to fork: ${repoOwner}/${repoName} (using user-provided PAT)"
                else
                  pushToken="${GH_TOKEN_VAL:-}"
                  echo "Pushing to source repo: ${repoOwner}/${repoName} (using GH App token)"
                fi

                # Normalize sentinel values ('empty', 'auto', '') so that
                # picking the default-named option in the ADO UI (which can't
                # leave the field truly empty) still triggers the auto-branch
                # logic below. Without this, branch=='empty' literally became
                # the PR head ref and every run reused PR #1 (see PR #38604
                # comment thread).
                branch="${{ parameters.PullRequestBranch }}"
                branch_lc=$(echo "$branch" | tr '[:upper:]' '[:lower:]')
                if [ -z "$branch" ] || [ "$branch_lc" = "empty" ] || [ "$branch_lc" = "auto" ]; then
                  branch="sdk-regenerate-$(Build.BuildId)"
                fi
                echo "Using PR branch: $branch"

                # Base the regeneration branch on the PR target branch (default:
                # main) rather than the currently checked-out HEAD. Otherwise
                # the PR would carry every commit that has accumulated on the
                # pipeline-development branch (feature/break-check) since it
                # forked from main — reviewers can't distinguish the actual
                # regeneration delta from pipeline-development noise. By
                # branching off origin/<target>, the PR shows exactly one
                # commit: the regeneration changes patched in below.
                target="${{ parameters.PullRequestTargetBranch }}"
                git fetch origin "$target" --depth=1
                git checkout -B "$branch" "origin/$target"

                mapfile -t patches < <(find "$(Pipeline.Workspace)" -type f -name changes.patch | sort)
                echo "Found ${#patches[@]} patch file(s)"
                for p in "${patches[@]}"; do
                  if [ -s "$p" ]; then
                    echo "Applying patch: $p"
                    if ! git apply --3way "$p"; then
                      echo "Failed to apply patch: $p"
                      git status --porcelain || true
                      exit 1
                    fi
                  fi
                done

                # Restore emitter-package.json / lock file so the PR only
                # contains real SDK code diffs (these were temporarily bumped
                # by the pipeline to the version under test and are not meant
                # to be part of the PR).
                git checkout -- eng/emitter-package.json eng/emitter-package-lock.json 2>/dev/null || true

                mode="${{ parameters.ChangePushMode }}"
                if [ "$mode" = "api-md" ]; then
                  git add -A -- ':(glob)sdk/**/review/*.api.md'
                else
                  git add -A sdk/
                fi

                if git diff --cached --quiet; then
                  echo "No changes selected for mode=$mode. Skipping PR creation."
                  echo "##vso[task.setvariable variable=HasPrChanges]false"
                  exit 0
                fi

                git -c user.name="azure-sdk" -c user.email="azuresdk@microsoft.com" commit -m "TypeSpec regeneration changes (${mode}) for emitter $(emitterVersion)"

                git remote remove pr-origin 2>/dev/null || true
                git remote add pr-origin "https://x-access-token:${pushToken}@github.com/${repoOwner}/${repoName}.git"
                git push pr-origin "$branch" --force

                echo "##vso[task.setvariable variable=HasPrChanges]true"
                echo "##vso[task.setvariable variable=PRBranchName]$branch"
                echo "##vso[task.setvariable variable=RepoOwner]$repoOwner"
                echo "##vso[task.setvariable variable=RepoNameOnly]$repoName"
                echo "##vso[task.setvariable variable=IsFork]$isFork"
                echo "##vso[task.setvariable variable=PushToken;issecret=true]$pushToken"
              displayName: 'Apply patches, commit and push branch'
              env:
                # Map secret variables into the script via env. This is the only
                # reliable way for ADO to inject secret variables — `$(name)` direct
                # substitution and `$[ variables[...] ]` indirect lookup do NOT work
                # reliably for secret variables.
                ${{ if ne(parameters.ForkTokenVariableName, '') }}:
                  FORK_TOKEN: $(${{ parameters.ForkTokenVariableName }})
                ${{ if eq(parameters.PullRequestRepoOwner, '') }}:
                  GH_TOKEN_VAL: $(GH_TOKEN)

            - task: PowerShell@2
              displayName: 'Create pull request'
              condition: and(succeeded(), eq(variables['HasPrChanges'], 'true'))
              inputs:
                pwsh: true
                targetType: inline
                # Build a rich PR description from the aggregated results JSON
                # that the Summary stage published (artifact: regen_summary),
                # then call Submit-PullRequest.ps1. The body lists every
                # package with breaking changes AND every package that was
                # skipped because it does not yet have a tsp-location.yaml —
                # so the upstream spec/SDK teams can see at a glance which
                # packages they still need to on-board, without digging
                # through ADO pipeline logs.
                script: |
                  $ErrorActionPreference = 'Stop'
                  $aggPath = Join-Path '$(Pipeline.Workspace)' 'regen_summary/aggregated-results.json'
                  $lines = New-Object System.Collections.Generic.List[string]
                  $lines.Add("Generated by ``$(Build.DefinitionName)`` build [$(Build.BuildNumber)]($(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)).")
                  $lines.Add("Emitter version: ``$(emitterVersion)``. Push mode: ``${{ parameters.ChangePushMode }}``.")
                  $lines.Add('')

                  if (Test-Path $aggPath) {
                    $agg = Get-Content $aggPath -Raw | ConvertFrom-Json

                    $lines.Add('## Regeneration summary')
                    $lines.Add("- Regenerated: **$($agg.regeneration.success)/$($agg.regeneration.total)**")
                    $lines.Add("- Built OK:    **$($agg.build.success)/$($agg.build.total)**")
                    $lines.Add("- Changelog generated: **$($agg.changelog.generated)/$($agg.changelog.total)**")
                    $lines.Add("- Packages with breaking changes: **$($agg.changelog.withBreaking)**")
                    $lines.Add('')

                    if ($agg.changelog.breakingPackages -and $agg.changelog.breakingPackages.Count -gt 0) {
                      $lines.Add("## Packages with breaking changes ($($agg.changelog.breakingPackages.Count))")
                      $lines.Add('Open each package''s `CHANGELOG.md` in the diff for details.')
                      $lines.Add('')
                      foreach ($p in $agg.changelog.breakingPackages) { $lines.Add("- ``$p``") }
                      $lines.Add('')
                    }

                    if ($agg.skippedNoTspLocation -and $agg.skippedNoTspLocation.Count -gt 0) {
                      $lines.Add("## Packages skipped — no usable tsp-location.yaml ($($agg.skippedNoTspLocation.Count))")
                      $lines.Add('These packages were filtered out by matrix gen (`-OnlyTypeSpec true`) and are NOT covered by this PR.')
                      $lines.Add('**Spec / SDK team action**: please add a `tsp-location.yaml` (or fix the existing one) so these packages participate in the next regeneration run.')
                      $lines.Add('')
                      $lines.Add('<details><summary>Click to expand the full list</summary>')
                      $lines.Add('')
                      foreach ($s in $agg.skippedNoTspLocation) { $lines.Add("- ``$($s.name)`` — $($s.reason)") }
                      $lines.Add('')
                      $lines.Add('</details>')
                      $lines.Add('')
                    }
                  } else {
                    $lines.Add('_(aggregated-results.json not found; falling back to minimal description)_')
                  }

                  $bodyText = ($lines -join "`n")
                  $prTitle  = 'TypeSpec regeneration: emitter $(emitterVersion) [${{ parameters.ChangePushMode }}]'
                  Write-Host '----- PR body preview (first 60 lines) -----'
                  $lines | Select-Object -First 60 | ForEach-Object { Write-Host $_ }
                  Write-Host '----- end preview -----'

                  # Every pipeline run uses a unique branch name
                  # (`sdk-regenerate-$(Build.BuildId)`) so Submit-PullRequest
                  # always creates a fresh PR with the correct title+body,
                  # rather than reusing an old PR whose body would otherwise
                  # be stuck on the first run's content. This preserves a
                  # per-run history of breaking-change reports that mentor
                  # and reviewers can compare across emitter versions.
                  & ./eng/common/scripts/Submit-PullRequest.ps1 `
                    -RepoOwner '$(RepoOwner)' `
                    -RepoName '$(RepoNameOnly)' `
                    -BaseBranch '${{ parameters.PullRequestTargetBranch }}' `
                    -PROwner '$(RepoOwner)' `
                    -PRBranch '$(PRBranchName)' `
                    -AuthToken '$(PushToken)' `
                    -PRTitle $prTitle `
                    -PRBody $bodyText
