# eng/pipelines/typespec-break-check.yml
# JS SDK TypeSpec Breaking Change Check Pipeline (ARM Only)
# Purpose: Validate that the latest emitter (@azure-tools/typespec-ts) doesn't break existing ARM SDK packages
# Flow: Fetch latest emitter version → update emitter-package.json → regenerate lock file
#       → clone latest azure-rest-api-specs (local spec source) → build spec index from tspconfig.yaml
#       → classify SDK packages (spec-index preferred, tsp-location fallback)
#       → tsp-client init --update-if-exists -c <local-tspconfig.yaml> --local-spec-repo (concurrent)
#       → pnpm build (concurrent)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/typespec-break-check.yml
      - eng/pipelines/scripts/regenerate-runner.js
      - eng/pipelines/scripts/breaking-change-detector.js

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/typespec-break-check.yml
      - eng/pipelines/scripts/regenerate-runner.js
      - eng/pipelines/scripts/breaking-change-detector.js

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly TypeSpec break check (Monday 2AM UTC)
    branches:
      include:
        - main

parameters:
  - name: EmitterVersion
    displayName: "Emitter version to test (empty = latest from npm dev tag)"
    type: string
    default: ''
  - name: MaxPackages
    displayName: "Max ARM packages to process (0 = all)"
    type: number
    default: 0
  - name: MaxWorkers
    displayName: "Concurrent workers"
    type: number
    default: 2
  - name: RegenerationJobCount
    displayName: "Matrix jobs for regeneration"
    type: number
    default: 10
  - name: MinimumPerJob
    displayName: "Minimum packages per matrix job"
    type: number
    default: 10
  - name: SkipBuild
    displayName: "Skip build verification"
    type: boolean
    default: false
  - name: SpecRepoBranch
    displayName: "azure-rest-api-specs branch to clone"
    type: string
    default: 'main'

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '22.x'

stages:
  - stage: Regenerate
    displayName: 'Regenerate & Build SDK packages'
    jobs:
      - job: Setup
        displayName: 'Resolve emitter version & prepare'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm install -g @azure-tools/typespec-client-generator-cli
            displayName: 'Install tsp-client'

          # Step 1: Resolve emitter version
          - script: |
              if [ -z "${{ parameters.EmitterVersion }}" ]; then
                EMITTER_VERSION=$(npm view @azure-tools/typespec-ts dist-tags.dev)
                echo "Resolved from npm dev tag: $EMITTER_VERSION"
              else
                EMITTER_VERSION="${{ parameters.EmitterVersion }}"
                echo "Using specified version: $EMITTER_VERSION"
              fi
              echo "##vso[task.setvariable variable=emitterVersion;isOutput=true]$EMITTER_VERSION"
            displayName: 'Step 1: Resolve emitter version'
            name: resolveVersion

          # Step 2: Update emitter-package.json + regenerate lock file
          - script: |
              cd $(sdkRoot)
              EMITTER_VERSION=$(resolveVersion.emitterVersion)

              # Update emitter-package.json
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('eng/emitter-package.json', 'utf8'));
                const oldVer = pkg.dependencies['@azure-tools/typespec-ts'];
                pkg.dependencies['@azure-tools/typespec-ts'] = '$EMITTER_VERSION';
                fs.writeFileSync('eng/emitter-package.json', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Updated: ' + oldVer + ' -> $EMITTER_VERSION');
              "

              # Regenerate lock file to prevent npm ci mismatch
              cd eng
              cp emitter-package.json package.json
              npm install --package-lock-only --ignore-scripts 2>/dev/null
              if [ -f package-lock.json ]; then
                cp package-lock.json emitter-package-lock.json
                rm -f package.json package-lock.json
                rm -rf node_modules
                echo "Lock file regenerated ✅"
              else
                echo "Warning: Failed to regenerate lock file"
              fi
            displayName: 'Step 2: Update emitter + regenerate lock file'

      - job: GenerateMatrix
        displayName: 'Generate package matrix'
        dependsOn: Setup
        steps:
          - task: PowerShell@2
            displayName: 'Split ARM packages into matrix batches'
            name: generateMatrix
            inputs:
              pwsh: true
              filePath: ./eng/common/scripts/New-RegenerateMatrix.ps1
              arguments: >
                -OutputDirectory "$(Build.ArtifactStagingDirectory)/matrix"
                -OutputVariableName matrix
                -JobCount ${{ parameters.RegenerationJobCount }}
                -MinimumPerJob ${{ parameters.MinimumPerJob }}
                -MaxPackages ${{ parameters.MaxPackages }}
                -OnlyTypeSpec false
                -DirectoryFilterPattern 'arm-*'
              workingDirectory: $(Build.SourcesDirectory)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish matrix artifacts'
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/matrix
              artifact: matrix_artifacts

      - job: RegenerateAndBuild
        displayName: 'Regenerate & build packages'
        dependsOn:
          - Setup
          - GenerateMatrix
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.GenerateMatrix.outputs['generateMatrix.matrix'] ]
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              npm install -g @azure-tools/typespec-client-generator-cli
              npm install -g pnpm
              npm config set legacy-peer-deps true
            displayName: 'Install tsp-client and pnpm'

          - download: current
            displayName: 'Download matrix artifacts'
            artifact: matrix_artifacts

          # Clone azure-rest-api-specs (latest main) as a sibling directory.
          - script: |
              if [ -d "$(specRepoRoot)" ]; then
                echo "Spec repo already exists at $(specRepoRoot), pulling latest..."
                cd $(specRepoRoot)
                git fetch origin ${{ parameters.SpecRepoBranch }}
                git checkout ${{ parameters.SpecRepoBranch }}
                git pull --ff-only
              else
                echo "Cloning azure-rest-api-specs (branch ${{ parameters.SpecRepoBranch }})..."
                git clone --depth 1 --branch ${{ parameters.SpecRepoBranch }} \
                  https://github.com/Azure/azure-rest-api-specs.git $(specRepoRoot)
              fi
              echo "Spec repo ready at $(specRepoRoot)"
              cd $(specRepoRoot) && git log -1 --oneline
            displayName: 'Clone azure-rest-api-specs (local spec source)'

          # Update emitter-package.json + lock file
          - script: |
              cd $(sdkRoot)
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('eng/emitter-package.json', 'utf8'));
                pkg.dependencies['@azure-tools/typespec-ts'] = '$(emitterVersion)';
                fs.writeFileSync('eng/emitter-package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              cd eng
              cp emitter-package.json package.json
              npm install --package-lock-only --ignore-scripts 2>/dev/null
              if [ -f package-lock.json ]; then
                cp package-lock.json emitter-package-lock.json
                rm -f package.json package-lock.json
                rm -rf node_modules
              fi
            displayName: 'Update emitter + lock file'

          # Step 3-5: Build spec index → classify packages → regenerate → build
          - script: |
              cd $(sdkRoot)
              mkdir -p "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
              node eng/pipelines/scripts/regenerate-runner.js \
                --specRepoRoot "$(specRepoRoot)" \
                --maxWorkers "${{ parameters.MaxWorkers }}" \
                --skipBuild "${{ parameters.SkipBuild }}" \
                --emitterVersion "$(emitterVersion)" \
                --directoryList "$(Pipeline.Workspace)/matrix_artifacts/$(DirectoryList)" \
                --resultOutputDir "$(Build.ArtifactStagingDirectory)/results/$(JobKey)"
            displayName: 'Regenerate & build ARM package batch'

          # Step 6: Breaking Change Detection
          - script: |
              cd $(sdkRoot)
              node eng/pipelines/scripts/breaking-change-detector.js \
                --baseline "HEAD" \
                --no-fail \
                --verbose
            displayName: 'Step 6: Detect breaking changes'
            condition: succeededOrFailed()

          - script: |
              cd $(sdkRoot)
              git diff --stat
            displayName: 'Show generated changes'
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: 'Publish batch result'
            condition: always()
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/results/$(JobKey)
              artifact: regen_result_$(JobKey)

      - job: Summary
        displayName: 'Summarize matrix results'
        dependsOn: RegenerateAndBuild
        condition: succeededOrFailed()
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - download: current
            displayName: 'Download result artifacts'

          - script: |
              node - <<'NODE'
              const fs = require("fs");
              const path = require("path");

              const root = process.env.PIPELINE_WORKSPACE;
              const resultFiles = [];

              function walk(dir) {
                if (!fs.existsSync(dir)) return;
                for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                  const full = path.join(dir, entry.name);
                  if (entry.isDirectory()) walk(full);
                  else if (entry.name === "result.json") resultFiles.push(full);
                }
              }

              walk(root);

              const totals = {
                packages: 0,
                regenTotal: 0,
                regenSuccess: 0,
                regenFailed: 0,
                buildTotal: 0,
                buildSuccess: 0,
                buildFailed: 0,
                regenFailures: [],
                buildFailures: [],
              };

              for (const file of resultFiles) {
                const result = JSON.parse(fs.readFileSync(file, "utf8"));
                totals.packages += result.packages?.length ?? 0;
                totals.regenTotal += result.regeneration?.total ?? 0;
                totals.regenSuccess += result.regeneration?.success ?? 0;
                totals.regenFailed += result.regeneration?.failed ?? 0;
                totals.regenFailures.push(...(result.regeneration?.failures ?? []));

                if (result.build) {
                  totals.buildTotal += result.build.total ?? 0;
                  totals.buildSuccess += result.build.success ?? 0;
                  totals.buildFailed += result.build.failed ?? 0;
                  totals.buildFailures.push(...(result.build.failures ?? []));
                }
              }

              console.log("========== MATRIX SUMMARY ==========");
              console.log(`Result files: ${resultFiles.length}`);
              console.log(`Packages: ${totals.packages}`);
              console.log("--- Regeneration ---");
              console.log(`Total: ${totals.regenTotal} | Success: ${totals.regenSuccess} | Failed: ${totals.regenFailed}`);
              console.log(`Success Rate: ${totals.regenTotal === 0 ? "0.0" : ((totals.regenSuccess * 100) / totals.regenTotal).toFixed(1)}%`);
              console.log("--- Build ---");
              console.log(`Total: ${totals.buildTotal} | Build OK: ${totals.buildSuccess} | Build Failed: ${totals.buildFailed}`);
              console.log(`Build Pass Rate: ${totals.buildTotal === 0 ? "0.0" : ((totals.buildSuccess * 100) / totals.buildTotal).toFixed(1)}%`);

              if (totals.regenFailures.length > 0) {
                console.log("");
                console.log("Regeneration failures:");
                for (const failure of totals.regenFailures) {
                  console.log(`  - ${failure.pkg}: ${failure.error}`);
                }
              }

              if (totals.buildFailures.length > 0) {
                console.log("");
                console.log("Build failures:");
                for (const failure of totals.buildFailures) {
                  console.log(`  - ${failure.pkg} (failed at ${failure.phase}): ${failure.error}`);
                }
              }
              console.log("====================================");

              if (resultFiles.length === 0 || totals.regenFailed > 0 || totals.buildFailed > 0) {
                process.exit(1);
              }
              NODE
            displayName: 'Aggregate regeneration results'
