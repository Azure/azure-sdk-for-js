# eng/pipelines/typespec-regression-integrated.yml
# JS SDK Regeneration Pipeline (ARM Only) — Fully Integrated Version
# All logic from typespec-regression-runner.js is inlined as bash scripts.
#
# Purpose: Validate that the latest emitter (@azure-tools/typespec-ts) doesn't break existing ARM SDK packages
# Flow: Fetch latest emitter version → update emitter-package.json → regenerate lock file
#       → clone latest azure-rest-api-specs (local spec source) → build spec index from tspconfig.yaml
#       → classify SDK packages (spec-index preferred, tsp-location fallback)
#       → tsp-client init --update-if-exists -c <local-tspconfig.yaml> --local-spec-repo (concurrent)
#       → pnpm build (concurrent)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/typespec-regression-integrated.yml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
  paths:
    include:
      - eng/emitter-package.json
      - eng/common/scripts/TypeSpec-*
      - eng/common/tsp-client/
      - eng/pipelines/typespec-regression-integrated.yml

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly SDK regeneration (Monday 2AM UTC)
    branches:
      include:
        - main

parameters:
  - name: EmitterVersion
    displayName: "Emitter version to test (empty = latest from npm dev tag)"
    type: string
    default: ''
  - name: MaxPackages
    displayName: "Max ARM packages to process (0 = all)"
    type: number
    default: 0
  - name: MaxWorkers
    displayName: "Concurrent workers"
    type: number
    default: 4
  - name: SkipBuild
    displayName: "Skip build verification"
    type: boolean
    default: false
  - name: SpecRepoBranch
    displayName: "azure-rest-api-specs branch to clone"
    type: string
    default: 'main'

pool:
  vmImage: 'ubuntu-latest'

variables:
  sdkRoot: $(Build.SourcesDirectory)
  specRepoRoot: $(Agent.BuildDirectory)/azure-rest-api-specs
  nodeVersion: '18.x'

stages:
  - stage: Regenerate
    displayName: 'Regenerate & Build SDK packages'
    jobs:
      - job: Setup
        displayName: 'Resolve emitter version & prepare'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm install -g @azure-tools/typespec-client-generator-cli
            displayName: 'Install tsp-client'

          # Step 1: Resolve emitter version
          - script: |
              if [ -z "${{ parameters.EmitterVersion }}" ]; then
                EMITTER_VERSION=$(npm view @azure-tools/typespec-ts dist-tags.dev)
                echo "Resolved from npm dev tag: $EMITTER_VERSION"
              else
                EMITTER_VERSION="${{ parameters.EmitterVersion }}"
                echo "Using specified version: $EMITTER_VERSION"
              fi
              echo "##vso[task.setvariable variable=emitterVersion;isOutput=true]$EMITTER_VERSION"
            displayName: 'Step 1: Resolve emitter version'
            name: resolveVersion

          # Step 2: Update emitter-package.json + regenerate lock file
          - script: |
              cd $(sdkRoot)
              EMITTER_VERSION=$(resolveVersion.emitterVersion)

              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('eng/emitter-package.json', 'utf8'));
                const oldVer = pkg.dependencies['@azure-tools/typespec-ts'];
                pkg.dependencies['@azure-tools/typespec-ts'] = '$EMITTER_VERSION';
                fs.writeFileSync('eng/emitter-package.json', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Updated: ' + oldVer + ' -> $EMITTER_VERSION');
              "

              cd eng
              cp emitter-package.json package.json
              npm install --package-lock-only --ignore-scripts 2>/dev/null
              if [ -f package-lock.json ]; then
                cp package-lock.json emitter-package-lock.json
                rm -f package.json package-lock.json
                rm -rf node_modules
                echo "Lock file regenerated ✅"
              else
                echo "Warning: Failed to regenerate lock file"
              fi
            displayName: 'Step 2: Update emitter + regenerate lock file'

      - job: RegenerateAndBuild
        displayName: 'Regenerate & build packages'
        dependsOn: Setup
        timeoutInMinutes: 180
        variables:
          emitterVersion: $[ dependencies.Setup.outputs['resolveVersion.emitterVersion'] ]
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              npm install -g @azure-tools/typespec-client-generator-cli
              npm install -g pnpm
            displayName: 'Install tsp-client and pnpm'

          - script: |
              if [ -d "$(specRepoRoot)" ]; then
                echo "Spec repo already exists at $(specRepoRoot), pulling latest..."
                cd $(specRepoRoot)
                git fetch origin ${{ parameters.SpecRepoBranch }}
                git checkout ${{ parameters.SpecRepoBranch }}
                git pull --ff-only
              else
                echo "Cloning azure-rest-api-specs (branch ${{ parameters.SpecRepoBranch }})..."
                git clone --depth 1 --branch ${{ parameters.SpecRepoBranch }} \
                  https://github.com/Azure/azure-rest-api-specs.git $(specRepoRoot)
              fi
              echo "Spec repo ready at $(specRepoRoot)"
              cd $(specRepoRoot) && git log -1 --oneline
            displayName: 'Clone azure-rest-api-specs (local spec source)'

          # Step 2 (on this VM): Update emitter-package.json + lock file again
          - script: |
              cd $(sdkRoot)
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('eng/emitter-package.json', 'utf8'));
                pkg.dependencies['@azure-tools/typespec-ts'] = '$(emitterVersion)';
                fs.writeFileSync('eng/emitter-package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              cd eng
              cp emitter-package.json package.json
              npm install --package-lock-only --ignore-scripts 2>/dev/null
              if [ -f package-lock.json ]; then
                cp package-lock.json emitter-package-lock.json
                rm -f package.json package-lock.json
                rm -rf node_modules
              fi
            displayName: 'Update emitter + lock file'

          # ====================================================================
          # Steps 3-5: Integrated bash — replaces typespec-regression-runner.js
          # ====================================================================
          - script: |
              set -uo pipefail

              # === Configuration ===
              SPEC_REPO_ROOT="$(specRepoRoot)"
              MAX_WORKERS="${{ parameters.MaxWorkers }}"
              MAX_PACKAGES="${{ parameters.MaxPackages }}"
              SKIP_BUILD="${{ parameters.SkipBuild }}"
              EMITTER_VERSION="$(emitterVersion)"
              SDK_ROOT="$(pwd)"

              # === Temp workspace ===
              WORK_DIR=$(mktemp -d)
              SPEC_INDEX_FILE="$WORK_DIR/spec_index.tsv"
              PACKAGE_LIST_FILE="$WORK_DIR/packages.tsv"
              REGEN_RESULTS_DIR="$WORK_DIR/regen_results"
              BUILD_RESULTS_DIR="$WORK_DIR/build_results"
              mkdir -p "$REGEN_RESULTS_DIR" "$BUILD_RESULTS_DIR"
              trap 'rm -rf "$WORK_DIR"' EXIT

              touch "$SPEC_INDEX_FILE" "$PACKAGE_LIST_FILE"

              # --------------------------------------------------------
              # AWK script: extract a scalar value from a YAML block
              # Given a parent key and child key, finds:
              #   parent_key:
              #     child_key: <value>   ← returns this value
              # --------------------------------------------------------
              read -r -d '' AWK_BLOCK_VALUE << 'ENDAWK' || true
              BEGIN { found=0; base=-1 }
              {
                match($0, /^[[:space:]]*/); indent=RLENGTH
                line=$0; gsub(/^[[:space:]]+/, "", line)
                if (line == "" || line ~ /^#/) next

                if (!found) {
                  test_line = line
                  gsub(/["'"'"']/, "", test_line)
                  key_part = test_line; sub(/:.*/, "", key_part)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key_part)
                  if (key_part == parent) {
                    found = 1; base = indent
                  }
                  next
                }

                if (found) {
                  if (indent <= base) { found=0; next }
                  test_line = line
                  gsub(/["'"'"']/, "", test_line)
                  key_part = test_line; sub(/:.*/, "", key_part)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key_part)
                  if (key_part == child) {
                    val = test_line; sub(/^[^:]*:[[:space:]]*/, "", val)
                    gsub(/[[:space:]]*#.*$/, "", val)
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", val)
                    print val
                    exit
                  }
                }
              }
              ENDAWK

              # --------------------------------------------------------
              # AWK script: check if file contains a YAML block for a key
              # Returns lines of that block (used to check existence)
              # --------------------------------------------------------
              read -r -d '' AWK_HAS_BLOCK << 'ENDAWK2' || true
              BEGIN { found=0; base=-1; count=0 }
              {
                match($0, /^[[:space:]]*/); indent=RLENGTH
                line=$0; gsub(/^[[:space:]]+/, "", line)
                if (line == "" || line ~ /^#/) {
                  if (found) next
                  else next
                }
                if (!found) {
                  test_line = line; gsub(/["'"'"']/, "", test_line)
                  if (index(test_line, target) == 1) {
                    found=1; base=indent; next
                  }
                }
                if (found) {
                  if (indent <= base) exit
                  count++; print line
                }
              }
              END { if (count == 0) exit 1 }
              ENDAWK2

              # === Helper Functions ===

              normalize_path() {
                echo "$1" | tr '\\' '/'
              }

              # Extract a scalar from within a named YAML block
              # Usage: yaml_block_value <file> <parent_key> <child_key>
              yaml_block_value() {
                awk -v parent="$2" -v child="$3" "$AWK_BLOCK_VALUE" "$1" 2>/dev/null
              }

              # Extract a parameter's default value
              # parameters:
              #   <param_name>:
              #     default: <value>
              yaml_param_default() {
                local file="$1" param="$2"
                # First find the parameter block, then get default
                local block
                block=$(awk -v target="$param" "$AWK_HAS_BLOCK" "$file" 2>/dev/null) || return
                echo "$block" | awk '
                {
                  line=$0; gsub(/^[[:space:]]+/, "", line)
                  gsub(/["'"'"']/, "", line)
                  if (line ~ /^default[[:space:]]*:/) {
                    sub(/^default[[:space:]]*:[[:space:]]*/, "", line)
                    gsub(/[[:space:]]*#.*$/, "", line)
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                    print line; exit
                  }
                }'
              }

              # Expand {var} placeholders in a template string
              expand_variables() {
                local template="$1" service_dir="$2" package_dir="$3" project_root="$4"
                local result="$template"
                for i in 1 2 3; do
                  local before="$result"
                  result=$(echo "$result" | sed \
                    -e "s|{service-dir}|${service_dir}|g" \
                    -e "s|{package-dir}|${package_dir}|g" \
                    -e "s|{project-root}|${project_root}|g" \
                    -e "s|{output-dir}||g")
                  [ "$result" = "$before" ] && break
                done
                echo "$result"
              }

              # Extract a short error summary from tsp-client / build output
              extract_error() {
                local output="$1"
                local err=""

                err=$(echo "$output" | grep -E 'tspconfig\.yaml not found' | head -1 | xargs 2>/dev/null)
                [ -n "$err" ] && echo "$err" && return

                err=$(echo "$output" | grep -oE '\.tsp:[0-9]+:[0-9]+ - error .+' | head -3 | \
                  sed 's/.*- //' | tr '\n' ' | ' | sed 's/ | $//')
                [ -n "$err" ] && echo "$err" && return

                err=$(echo "$output" | grep -E '^npm error' | grep -v '^npm error$' | head -2 | \
                  tr '\n' ' | ' | sed 's/ | $//')
                [ -n "$err" ] && echo "$err" && return

                err=$(echo "$output" | grep -E 'fatal:|git clone failed' | head -2 | \
                  tr '\n' ' | ' | sed 's/ | $//')
                [ -n "$err" ] && echo "$err" && return

                err=$(echo "$output" | grep -E 'Invalid config|warp build threw|does not exist|Cannot find' | head -2 | \
                  tr '\n' ' | ' | sed 's/ | $//')
                [ -n "$err" ] && echo "$err" && return

                err=$(echo "$output" | grep -E 'Failed to generate|Error:' | grep -v 'tsp-client-config\.yaml' | head -2 | \
                  tr '\n' ' | ' | sed 's/ | $//')
                [ -n "$err" ] && echo "$err" && return

                echo "Unknown error"
              }

              is_retryable_git_error() {
                echo "$1" | grep -qE 'git clone failed|fatal: early EOF|unable to access|Failed to connect|Could not connect to server|The remote end hung up unexpectedly'
              }

              # =========================================================
              # Pre-flight: detect nested duplicate workspace directories
              # =========================================================
              preflight_check() {
                local nested
                nested=$(find sdk -path "*/node_modules/*" -prune -o \
                  -path "sdk/*/*/sdk/*/*/package.json" -print 2>/dev/null | head -20)
                if [ -n "$nested" ]; then
                  echo "Pre-flight: nested duplicate workspace directories found:"
                  echo "$nested" | while IFS= read -r p; do echo "  - $(dirname "$p")"; done
                  echo "ERROR: Nested duplicate workspaces will make pnpm/turbo fail. Remove them before running the pipeline."
                  exit 1
                fi
                echo "Pre-flight: no nested duplicate workspaces found."
              }

              # =========================================================
              # Step 3: Build spec index
              # Scans all tspconfig.yaml in the spec repo, filters for ARM
              # packages with @azure-tools/typespec-ts emitter, and maps
              # each to its SDK-relative directory.
              # Output: SPEC_INDEX_FILE (TSV: sdk_relative | tsp_config_path | local_spec_path)
              # =========================================================
              build_spec_index() {
                echo "===== Step 3: Build spec index ====="
                local spec_dir="$SPEC_REPO_ROOT/specification"
                local total=0 indexed=0 no_emitter=0 bad_path=0 arm_count=0

                while IFS= read -r tsp_config; do
                  total=$((total + 1))

                  # Must have @azure-tools/typespec-ts emitter
                  if ! grep -q '@azure-tools/typespec-ts' "$tsp_config" 2>/dev/null; then
                    no_emitter=$((no_emitter + 1))
                    continue
                  fi

                  # ARM only
                  local norm_config
                  norm_config=$(normalize_path "$tsp_config")
                  if ! echo "$norm_config" | grep -qE '(/resource-manager/|\.Management/)'; then
                    continue
                  fi

                  local local_spec_path
                  local_spec_path=$(dirname "$tsp_config")

                  # Extract service-dir and package-dir from the typespec-ts options block
                  local service_dir package_dir emitter_output_dir
                  service_dir=$(yaml_block_value "$tsp_config" "@azure-tools/typespec-ts" "service-dir")
                  package_dir=$(yaml_block_value "$tsp_config" "@azure-tools/typespec-ts" "package-dir")
                  emitter_output_dir=$(yaml_block_value "$tsp_config" "@azure-tools/typespec-ts" "emitter-output-dir")

                  # Fallback: check parameters section for service-dir default
                  if [ -z "$service_dir" ]; then
                    service_dir=$(yaml_param_default "$tsp_config" "service-dir")
                  fi

                  local sdk_relative=""
                  if [ -n "$service_dir" ] && [ -n "$package_dir" ]; then
                    sdk_relative=$(normalize_path "${service_dir}/${package_dir}")
                  elif [ -n "$emitter_output_dir" ]; then
                    local expanded
                    expanded=$(expand_variables "$emitter_output_dir" "${service_dir:-}" "${package_dir:-}" "$local_spec_path")
                    expanded=$(normalize_path "$expanded" | sed 's|^/\+||')
                    # Extract the sdk/... part
                    sdk_relative=$(echo "$expanded" | grep -oP 'sdk/\S+' | head -1)
                  fi

                  if [ -z "$sdk_relative" ]; then
                    bad_path=$((bad_path + 1))
                    continue
                  fi

                  # Deduplicate: only keep first occurrence per sdk_relative
                  if ! grep -q "^${sdk_relative}	" "$SPEC_INDEX_FILE" 2>/dev/null; then
                    printf '%s\t%s\t%s\n' "$sdk_relative" "$tsp_config" "$local_spec_path" >> "$SPEC_INDEX_FILE"
                    indexed=$((indexed + 1))
                    arm_count=$((arm_count + 1))
                  fi

                done < <(find "$spec_dir" -name "tspconfig.yaml" \
                  -not -path "*/node_modules/*" \
                  -not -path "*/.git/*" \
                  -not -path "*/.*/*" 2>/dev/null | sort)

                echo "Spec index: scanned $total tspconfig.yaml files"
                echo "  Indexed: $indexed JS targets ($arm_count ARM)"
                echo "  Skipped: $no_emitter no typespec-ts emitter, $bad_path unresolvable paths"
              }

              # =========================================================
              # Step 3 (cont): Classify packages
              # Finds all arm-* directories in SDK, matches them against
              # spec index or tsp-location.yaml, produces the final
              # package list for regeneration.
              # Output: PACKAGE_LIST_FILE (TSV: pkg | pkg_dir | tsp_config | local_spec | source)
              # =========================================================
              classify_packages() {
                echo ""
                echo "===== Classify ARM packages ====="
                local will_run=0 skipped=0 rescued=0

                # Find all arm-* directories
                local arm_dirs
                arm_dirs=$(find sdk -path "*/node_modules/*" -prune -o -type d -name "arm-*" -print 2>/dev/null | sort)

                while IFS= read -r dir; do
                  [ -z "$dir" ] && continue
                  local name
                  name=$(normalize_path "$dir")
                  local tsp_location_path="${dir}/tsp-location.yaml"
                  local has_tsp_location=false
                  local tsp_location_problem=""

                  if [ -f "$tsp_location_path" ]; then
                    has_tsp_location=true

                    # Check for relative repo (unsupported)
                    if grep -qE '^\s*repo\s*:\s*\.\.' "$tsp_location_path" 2>/dev/null; then
                      tsp_location_problem="relative repo"
                    else
                      # Extract directory field
                      local directory_val
                      directory_val=$(grep -oP '^\s*directory\s*:\s*\K.+' "$tsp_location_path" 2>/dev/null | xargs)
                      if [ -z "$directory_val" ]; then
                        tsp_location_problem="missing 'directory:' field"
                      else
                        local tsp_config_check="$SPEC_REPO_ROOT/$directory_val/tspconfig.yaml"
                        if [ ! -f "$tsp_config_check" ]; then
                          tsp_location_problem="stale path: $directory_val"
                        fi
                      fi
                    fi
                  fi

                  # Try spec-index first
                  local spec_entry
                  spec_entry=$(grep "^${name}	" "$SPEC_INDEX_FILE" 2>/dev/null | head -1)

                  if [ -n "$spec_entry" ]; then
                    local tsp_config local_spec
                    tsp_config=$(echo "$spec_entry" | cut -f2)
                    local_spec=$(echo "$spec_entry" | cut -f3)
                    if [ -n "$tsp_location_problem" ]; then
                      rescued=$((rescued + 1))
                      echo "  [RESCUED] $name — was: $tsp_location_problem"
                    fi
                    printf '%s\t%s\t%s\t%s\t%s\n' \
                      "$name" "$SDK_ROOT/$dir" "$tsp_config" "$local_spec" "spec-index" \
                      >> "$PACKAGE_LIST_FILE"
                    will_run=$((will_run + 1))
                  elif $has_tsp_location && [ -z "$tsp_location_problem" ]; then
                    local directory_val
                    directory_val=$(grep -oP '^\s*directory\s*:\s*\K.+' "$tsp_location_path" 2>/dev/null | xargs)
                    local local_spec
                    local_spec=$(normalize_path "$SPEC_REPO_ROOT/$directory_val")
                    printf '%s\t%s\t%s\t%s\t%s\n' \
                      "$name" "$SDK_ROOT/$dir" "$local_spec/tspconfig.yaml" "$local_spec" "tsp-location" \
                      >> "$PACKAGE_LIST_FILE"
                    will_run=$((will_run + 1))
                  else
                    local reason="no tsp-location.yaml + not in spec index"
                    $has_tsp_location && reason="$tsp_location_problem"
                    echo "  [SKIP] $name — $reason"
                    skipped=$((skipped + 1))
                  fi
                done <<< "$arm_dirs"

                # Limit packages if MaxPackages > 0
                if [ "$MAX_PACKAGES" -gt 0 ] && [ "$will_run" -gt "$MAX_PACKAGES" ]; then
                  local tmp_limited="$WORK_DIR/packages_limited.tsv"
                  head -n "$MAX_PACKAGES" "$PACKAGE_LIST_FILE" > "$tmp_limited"
                  mv "$tmp_limited" "$PACKAGE_LIST_FILE"
                  will_run=$MAX_PACKAGES
                  echo "  Limited to first $MAX_PACKAGES packages"
                fi

                echo ""
                echo "  ✅ Will run: $will_run packages"
                local spec_idx_count tsp_loc_count
                spec_idx_count=$(grep -c 'spec-index$' "$PACKAGE_LIST_FILE" 2>/dev/null || echo 0)
                tsp_loc_count=$(grep -c 'tsp-location$' "$PACKAGE_LIST_FILE" 2>/dev/null || echo 0)
                echo "       via spec-index: $spec_idx_count"
                echo "       via tsp-location: $tsp_loc_count"
                [ "$rescued" -gt 0 ] && echo "  💚 Rescued by spec index: $rescued"
                [ "$skipped" -gt 0 ] && echo "  ❌ Skipped: $skipped packages"

                # Report new/un-onboarded specs
                local new_count=0
                while IFS=$'\t' read -r sdk_rel _rest; do
                  local sdk_dir_path="$SDK_ROOT/$sdk_rel"
                  if [ ! -d "$sdk_dir_path" ]; then
                    [ "$new_count" -eq 0 ] && echo "  ℹ️  Spec declares JS packages with no SDK dir yet (new/un-onboarded):"
                    echo "       [NEW] $sdk_rel"
                    new_count=$((new_count + 1))
                  fi
                done < "$SPEC_INDEX_FILE"
                echo ""
              }

              # =========================================================
              # Step 4: Regenerate all packages
              # Runs tsp-client init --update-if-exists for each package
              # with concurrency control and retry on git errors.
              # =========================================================
              regenerate_all() {
                local total
                total=$(wc -l < "$PACKAGE_LIST_FILE")
                if [ "$total" -eq 0 ]; then
                  echo "No packages to regenerate."
                  return
                fi

                echo "===== Step 4: Regeneration (tsp-client init --update-if-exists) ====="
                echo "Processing $total packages with $MAX_WORKERS workers"
                echo ""

                # Write a self-contained per-package processor script
                cat > "$WORK_DIR/regen_one.sh" << 'REGEN_SCRIPT'
              #!/bin/bash
              PKG_NAME="$1"
              PKG_DIR="$2"
              TSP_CONFIG="$3"
              LOCAL_SPEC="$4"
              SOURCE="$5"
              RESULT_FILE="$6"

              MAX_ATTEMPTS=3
              TIMEOUT=600

              start_time=$(date +%s)
              all_output=""
              success=false

              all_output="Package dir   : $PKG_DIR\n"
              all_output+="Spec source   : $SOURCE\n"
              all_output+="tsp-config    : $TSP_CONFIG\n"
              all_output+="local-spec    : $LOCAL_SPEC\n"

              if [ ! -f "$TSP_CONFIG" ]; then
                all_output+="ERROR: tspconfig.yaml not found at $TSP_CONFIG (spec may have been renamed/deleted)\n"
                end_time=$(date +%s)
                duration=$((end_time - start_time))
                printf 'FAIL\t%s\t%s\t%s\n' "$PKG_NAME" "$duration" "tspconfig.yaml not found at $TSP_CONFIG" > "$RESULT_FILE"
                exit 0
              fi

              for attempt in $(seq 1 $MAX_ATTEMPTS); do
                if [ "$attempt" -gt 1 ]; then
                  sleep $((10 * (attempt - 1)))
                fi

                result=""
                exit_code=0
                if [ -d "$PKG_DIR" ]; then
                  result=$(cd "$PKG_DIR" && timeout "$TIMEOUT" \
                    tsp-client init --update-if-exists -c "$TSP_CONFIG" --local-spec-repo "$LOCAL_SPEC" --debug 2>&1) || exit_code=$?
                else
                  result="ERROR: Package directory $PKG_DIR does not exist"
                  exit_code=1
                fi

                all_output+="\n===== Attempt $attempt/$MAX_ATTEMPTS =====\n$result\nExit code: $exit_code\n"

                if [ "$exit_code" -eq 0 ]; then
                  success=true
                  break
                fi

                # Only retry on git-related transient errors
                if ! echo "$result" | grep -qE 'git clone failed|fatal: early EOF|unable to access|Failed to connect|Could not connect to server|The remote end hung up unexpectedly'; then
                  break
                fi
              done

              end_time=$(date +%s)
              duration=$((end_time - start_time))

              if $success; then
                printf 'OK\t%s\t%s\t\n' "$PKG_NAME" "$duration" > "$RESULT_FILE"
              else
                # Extract short error summary
                error_line=$(echo -e "$all_output" | grep -E 'tspconfig\.yaml not found' | head -1 | xargs 2>/dev/null)
                if [ -z "$error_line" ]; then
                  error_line=$(echo -e "$all_output" | grep -oE '\.tsp:[0-9]+:[0-9]+ - error .+' | head -1 | sed 's/.*- //' | xargs 2>/dev/null)
                fi
                if [ -z "$error_line" ]; then
                  error_line=$(echo -e "$all_output" | grep -E '^npm error' | grep -v '^npm error$' | head -1 | xargs 2>/dev/null)
                fi
                if [ -z "$error_line" ]; then
                  error_line=$(echo -e "$all_output" | grep -E 'fatal:|git clone failed' | head -1 | xargs 2>/dev/null)
                fi
                if [ -z "$error_line" ]; then
                  error_line=$(echo -e "$all_output" | grep -E 'Failed to generate|Error:' | grep -v 'tsp-client-config\.yaml' | head -1 | xargs 2>/dev/null)
                fi
                [ -z "$error_line" ] && error_line="Unknown error"
                printf 'FAIL\t%s\t%s\t%s\n' "$PKG_NAME" "$duration" "$error_line" > "$RESULT_FILE"
              fi
              REGEN_SCRIPT
                chmod +x "$WORK_DIR/regen_one.sh"

                # Launch concurrent workers
                local idx=0 active=0 completed=0
                while IFS=$'\t' read -r pkg pkg_dir tsp_config local_spec source; do
                  local result_file="$REGEN_RESULTS_DIR/${idx}.result"
                  bash "$WORK_DIR/regen_one.sh" "$pkg" "$pkg_dir" "$tsp_config" "$local_spec" "$source" "$result_file" &
                  active=$((active + 1))
                  idx=$((idx + 1))

                  if [ "$active" -ge "$MAX_WORKERS" ]; then
                    wait -n 2>/dev/null || true
                    active=$((active - 1))
                  fi
                done < "$PACKAGE_LIST_FILE"
                wait

                # Print results
                local total_pkg=$idx
                local regen_ok=0 regen_fail=0
                for f in "$REGEN_RESULTS_DIR"/*.result; do
                  [ -f "$f" ] || continue
                  local status pkg_name duration error_msg
                  IFS=$'\t' read -r status pkg_name duration error_msg < "$f"
                  completed=$((completed + 1))
                  if [ "$status" = "OK" ]; then
                    regen_ok=$((regen_ok + 1))
                    echo "  ✅ [${completed}/${total_pkg}] ${pkg_name} - SUCCESS (${duration}s)"
                  else
                    regen_fail=$((regen_fail + 1))
                    echo "  ❌ [${completed}/${total_pkg}] ${pkg_name} - FAILED (${duration}s)"
                    echo "     ${error_msg}"
                  fi
                done

                # Store counts for summary
                echo "$regen_ok" > "$WORK_DIR/regen_ok_count"
                echo "$regen_fail" > "$WORK_DIR/regen_fail_count"
              }

              # =========================================================
              # Step 5: Build verification
              # Runs pnpm build for each successfully regenerated package.
              # =========================================================
              build_all() {
                local regen_ok
                regen_ok=$(cat "$WORK_DIR/regen_ok_count" 2>/dev/null || echo 0)

                if [ "$SKIP_BUILD" = "True" ] || [ "$SKIP_BUILD" = "true" ] || [ "$regen_ok" -eq 0 ]; then
                  if [ "$SKIP_BUILD" = "True" ] || [ "$SKIP_BUILD" = "true" ]; then
                    echo "Build verification skipped (SkipBuild=true)"
                  fi
                  echo "0" > "$WORK_DIR/build_ok_count"
                  echo "0" > "$WORK_DIR/build_fail_count"
                  return
                fi

                echo ""
                echo "===== Step 5: Build Verification (pnpm build --filter) ====="

                # pnpm install at repo root
                echo "Running pnpm install at repo root..."
                if ! pnpm install --no-frozen-lockfile 2>&1 | tail -5; then
                  echo "ERROR: pnpm install failed. Cannot proceed with build verification."
                  echo "0" > "$WORK_DIR/build_ok_count"
                  echo "0" > "$WORK_DIR/build_fail_count"
                  return
                fi
                echo "pnpm install completed"
                echo ""

                # Collect successfully regenerated packages
                local success_pkgs=()
                for f in "$REGEN_RESULTS_DIR"/*.result; do
                  [ -f "$f" ] || continue
                  local status pkg_name
                  IFS=$'\t' read -r status pkg_name _rest < "$f"
                  [ "$status" = "OK" ] && success_pkgs+=("$pkg_name")
                done

                local build_total=${#success_pkgs[@]}
                echo "Building $build_total packages with $MAX_WORKERS workers"
                echo ""

                # Write build processor script
                cat > "$WORK_DIR/build_one.sh" << 'BUILD_SCRIPT'
              #!/bin/bash
              PKG_NAME="$1"
              SDK_ROOT="$2"
              RESULT_FILE="$3"

              pkg_dir="$SDK_ROOT/$PKG_NAME"
              filter_name="$PKG_NAME"

              # Try to read the real package name from package.json
              if [ -f "$pkg_dir/package.json" ]; then
                real_name=$(grep -oP '"name"\s*:\s*"\K[^"]+' "$pkg_dir/package.json" 2>/dev/null | head -1)
                [ -n "$real_name" ] && filter_name="$real_name"
              fi

              start_time=$(date +%s)
              output=$(cd "$SDK_ROOT" && pnpm build --filter "$filter_name" 2>&1) || true
              exit_code=$?
              end_time=$(date +%s)
              duration=$((end_time - start_time))

              if [ "$exit_code" -eq 0 ]; then
                printf 'OK\t%s\t%s\tdone\t\n' "$PKG_NAME" "$duration" > "$RESULT_FILE"
              else
                error_line=$(echo "$output" | grep -E 'Invalid config|does not exist|Cannot find|Error:' | head -1 | xargs 2>/dev/null)
                [ -z "$error_line" ] && error_line="Build failed"
                printf 'FAIL\t%s\t%s\tpnpm build\t%s\n' "$PKG_NAME" "$duration" "$error_line" > "$RESULT_FILE"
              fi
              BUILD_SCRIPT
                chmod +x "$WORK_DIR/build_one.sh"

                # Launch concurrent build workers
                local bidx=0 active=0
                for pkg in "${success_pkgs[@]}"; do
                  local result_file="$BUILD_RESULTS_DIR/${bidx}.result"
                  bash "$WORK_DIR/build_one.sh" "$pkg" "$SDK_ROOT" "$result_file" &
                  active=$((active + 1))
                  bidx=$((bidx + 1))
                  if [ "$active" -ge "$MAX_WORKERS" ]; then
                    wait -n 2>/dev/null || true
                    active=$((active - 1))
                  fi
                done
                wait

                # Print build results
                local completed=0 build_ok=0 build_fail=0
                for f in "$BUILD_RESULTS_DIR"/*.result; do
                  [ -f "$f" ] || continue
                  local status pkg_name duration phase error_msg
                  IFS=$'\t' read -r status pkg_name duration phase error_msg < "$f"
                  completed=$((completed + 1))
                  if [ "$status" = "OK" ]; then
                    build_ok=$((build_ok + 1))
                    echo "  ✅ [BUILD ${completed}/${build_total}] ${pkg_name} - BUILD OK (${duration}s)"
                  else
                    build_fail=$((build_fail + 1))
                    echo "  ❌ [BUILD ${completed}/${build_total}] ${pkg_name} - BUILD FAILED (${duration}s)"
                    echo "     ${error_msg}"
                  fi
                done

                echo "$build_ok" > "$WORK_DIR/build_ok_count"
                echo "$build_fail" > "$WORK_DIR/build_fail_count"
              }

              # =========================================================
              # Summary report
              # =========================================================
              print_summary() {
                local total_pkg
                total_pkg=$(wc -l < "$PACKAGE_LIST_FILE")
                local regen_ok regen_fail build_ok build_fail
                regen_ok=$(cat "$WORK_DIR/regen_ok_count" 2>/dev/null || echo 0)
                regen_fail=$(cat "$WORK_DIR/regen_fail_count" 2>/dev/null || echo 0)
                build_ok=$(cat "$WORK_DIR/build_ok_count" 2>/dev/null || echo 0)
                build_fail=$(cat "$WORK_DIR/build_fail_count" 2>/dev/null || echo 0)

                echo ""
                echo "========== SUMMARY =========="
                [ -n "$EMITTER_VERSION" ] && echo "Emitter: @azure-tools/typespec-ts@$EMITTER_VERSION"
                echo ""
                echo "--- Regeneration (tsp-client init --update-if-exists) ---"
                echo "Total: $total_pkg | Success: $regen_ok | Failed: $regen_fail"
                if [ "$total_pkg" -gt 0 ]; then
                  local pct
                  pct=$(awk "BEGIN { printf \"%.1f\", ($regen_ok * 100) / $total_pkg }")
                  echo "Success Rate: ${pct}%"
                else
                  echo "Success Rate: 0.0%"
                fi

                if [ "$SKIP_BUILD" != "True" ] && [ "$SKIP_BUILD" != "true" ] && [ "$regen_ok" -gt 0 ]; then
                  echo ""
                  echo "--- Build Verification (pnpm build) ---"
                  echo "Total: $regen_ok | Build OK: $build_ok | Build Failed: $build_fail"
                  local build_pct
                  build_pct=$(awk "BEGIN { printf \"%.1f\", ($build_ok * 100) / $regen_ok }")
                  echo "Build Pass Rate: ${build_pct}%"
                fi

                # List failures
                if [ "$regen_fail" -gt 0 ]; then
                  echo ""
                  echo "Regeneration failures:"
                  for f in "$REGEN_RESULTS_DIR"/*.result; do
                    [ -f "$f" ] || continue
                    local status pkg_name duration error_msg
                    IFS=$'\t' read -r status pkg_name duration error_msg < "$f"
                    [ "$status" = "FAIL" ] && echo "  - ${pkg_name}: ${error_msg}"
                  done
                fi

                if [ "$build_fail" -gt 0 ]; then
                  echo ""
                  echo "Build failures:"
                  for f in "$BUILD_RESULTS_DIR"/*.result; do
                    [ -f "$f" ] || continue
                    local status pkg_name duration phase error_msg
                    IFS=$'\t' read -r status pkg_name duration phase error_msg < "$f"
                    [ "$status" = "FAIL" ] && echo "  - ${pkg_name} (failed at ${phase}): ${error_msg}"
                  done
                fi
                echo "============================="

                if [ "$regen_fail" -gt 0 ] || [ "$build_fail" -gt 0 ]; then
                  exit 1
                fi
              }

              # =========================================================
              # Main entry point
              # =========================================================
              echo "SDK Root      : $SDK_ROOT"
              echo "Spec Repo Root: $SPEC_REPO_ROOT"
              echo "Max Workers   : $MAX_WORKERS"
              echo "Max Packages  : $MAX_PACKAGES"
              echo "Skip Build    : $SKIP_BUILD"
              echo "Emitter       : $EMITTER_VERSION"
              echo ""

              cd "$SDK_ROOT"

              preflight_check
              build_spec_index
              classify_packages
              regenerate_all
              build_all
              print_summary
            displayName: 'Regenerate & build ARM packages (integrated bash)'

          # Step 6: Breaking Change Detection
          - script: |
              cd $(sdkRoot)
              node eng/pipelines/scripts/breaking-change-detector.js \
                --baseline "HEAD" \
                --no-fail \
                --verbose
            displayName: 'Step 6: Detect breaking changes'
            condition: succeededOrFailed()

          - script: |
              cd $(sdkRoot)
              git diff --stat
            displayName: 'Show generated changes'
            condition: always()
