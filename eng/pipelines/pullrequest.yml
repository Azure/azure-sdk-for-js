pr:
  branches:
    include:
    - main
    - feature/*
    - hotfix/*
    - release/*
    - pipelinev3*
  paths:
    include:
    - "*"
    exclude:
    - .github/skills/azsdk-common-*/**

parameters:
  - name: Service
    type: string
    default: auto
  - name: SkipPrValidation
    type: boolean
    default: false

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: ${{ parameters.Service }}
    SkipPrValidation: ${{ parameters.SkipPrValidation }}
