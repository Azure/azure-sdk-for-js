parameters:
  Artifacts: []
  ServiceDirectory: not-specified
  TestProxy: true
  OSName: ''

steps:
  - template: /eng/common/pipelines/templates/steps/verify-agent-os.yml
    parameters:
      AgentImage: ${{ parameters.OSName}}

  - template: /eng/common/pipelines/templates/steps/save-package-properties.yml
    parameters:
      ServiceDirectory: ${{parameters.ServiceDirectory}}

  - script: |
      npm install -g pnpm
    displayName: "Install Pnpm"

  - script: |
      pnpm install
    displayName: "Install library dependencies"

  - template: /eng/pipelines/templates/steps/set-artifact-packages.yml
    parameters:
      PackageInfo: $(Build.ArtifactStagingDirectory)/PackageInfo
      Artifacts: ${{ parameters.Artifacts }}

  - script: |
      node eng/tools/ci-runner/index.js build $(ChangedServices) -packages "$(ArtifactPackageNames)" -packageInfo "$(Build.ArtifactStagingDirectory)/PackageInfo" -changeInfo "$(Build.ArtifactStagingDirectory)/diff/diff.json"
    env:
      TURBO_TEAM: azsdkjs
      TURBO_TEAMID: azsdkjs
      TURBO_CACHE: local:rw,remote:r
      TURBO_TOKEN: faketoken
    displayName: "Build libraries"

  - template: ../steps/use-node-test-version.yml

  - ${{ if eq(parameters.TestProxy, true) }}:
    - template: /eng/common/testproxy/test-proxy-standalone-tool.yml

  - script: |
      node eng/tools/ci-runner/index.js test:node $(ChangedServices) -packages "$(ArtifactPackageNames)" -packageInfo "$(Build.ArtifactStagingDirectory)/PackageInfo" -changeInfo "$(Build.ArtifactStagingDirectory)/diff/diff.json" --ci
    displayName: "Test libraries node NodeJS $(NodeTestVersion)"
    condition: and(succeeded(),eq(variables['TestType'], 'node'),eq(variables['DependencyVersion'],''))

  # Min/max dependency version testing steps (only run when DependencyVersion is set)
  - script: |
      npm install
    displayName: "Install dependency-testing tool dependencies"
    workingDirectory: $(Build.SourcesDirectory)/eng/tools/dependency-testing
    condition: and(succeeded(),eq(variables['TestType'], 'node'),ne(variables['DependencyVersion'],''))

  - pwsh: |
      $packageInfoFiles = Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/PackageInfo" *.json
      $packageSet = "$(ArtifactPackageNames)" -split ","
      foreach ($file in $packageInfoFiles) {
        $pkg = Get-Content $file.FullName | ConvertFrom-Json
        if ($packageSet -contains $pkg.ArtifactName) {
          Write-Host "Converting $($pkg.Name) tests to run against $(DependencyVersion) version of dependencies"
          node index.js `
            --artifact-name "$($pkg.Name)" `
            --version-type "$(DependencyVersion)" `
            --source-dir "$(Build.SourcesDirectory)" `
            --test-folder "test/public"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to convert tests for $($pkg.Name)"
            exit 1
          }
        }
      }
    displayName: "Convert tests to run against $(DependencyVersion) version of dependencies"
    workingDirectory: $(Build.SourcesDirectory)/eng/tools/dependency-testing
    condition: and(succeeded(),eq(variables['TestType'], 'node'),ne(variables['DependencyVersion'],''))

  - script: |
      pnpm install --no-frozen-lockfile
    displayName: "Re-run pnpm install with $(DependencyVersion) dependency versions"
    condition: and(succeeded(),eq(variables['TestType'], 'node'),ne(variables['DependencyVersion'],''))

  - pwsh: |
      $packageInfoFiles = Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/PackageInfo" *.json
      $packageSet = "$(ArtifactPackageNames)" -split ","
      $failed = $false
      foreach ($file in $packageInfoFiles) {
        $pkg = Get-Content $file.FullName | ConvertFrom-Json
        if ($packageSet -contains $pkg.ArtifactName) {
          $testPublicPath = Join-Path "$(Build.SourcesDirectory)" $pkg.DirectoryPath "test/public"
          if (Test-Path (Join-Path $testPublicPath "package.json")) {
            Write-Host "Building test package for $($pkg.Name)"
            Set-Location $testPublicPath
            pnpm run build
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Build failed for $($pkg.Name)"
              $failed = $true
            }
          }
        }
      }
      if ($failed) { exit 1 }
    displayName: "Build test packages for $(DependencyVersion) dependency testing"
    condition: and(succeeded(),eq(variables['TestType'], 'node'),ne(variables['DependencyVersion'],''))

  - pwsh: |
      $packageInfoFiles = Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/PackageInfo" *.json
      $packageSet = "$(ArtifactPackageNames)" -split ","
      $failed = $false
      foreach ($file in $packageInfoFiles) {
        $pkg = Get-Content $file.FullName | ConvertFrom-Json
        if ($packageSet -contains $pkg.ArtifactName) {
          $testPublicPath = Join-Path "$(Build.SourcesDirectory)" $pkg.DirectoryPath "test/public"
          if (Test-Path (Join-Path $testPublicPath "vitest.dependency-test.config.ts")) {
            Write-Host "Testing $($pkg.Name) with $(DependencyVersion) dependencies"
            Set-Location $testPublicPath
            pnpm run test:node
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Tests failed for $($pkg.Name)"
              $failed = $true
            }
          }
        }
      }
      if ($failed) { exit 1 }
    displayName: "Test libraries node NodeJS $(NodeTestVersion) - $(DependencyVersion) dependencies"
    condition: and(succeeded(),eq(variables['TestType'], 'node'),ne(variables['DependencyVersion'],''))

  - script: |
      node eng/tools/ci-runner/index.js test:browser $(ChangedServices) -packages "$(ArtifactPackageNames)" -packageInfo "$(Build.ArtifactStagingDirectory)/PackageInfo" -changeInfo "$(Build.ArtifactStagingDirectory)/diff/diff.json" --ci
    displayName: "Test libraries browser NodeJS $(NodeTestVersion)"
    condition: and(succeeded(),eq(variables['TestType'], 'browser'))

  - ${{ if eq(parameters.TestProxy, true) }}:
    - pwsh: |
        copy $(Build.SourcesDirectory)/test-proxy.log $(Build.ArtifactStagingDirectory)
      displayName: 'Dump Test Proxy logs'
      condition: succeededOrFailed()

  # Unlink node_modules folders to significantly improve performance of subsequent tasks
  # which need to walk the directory tree (and are hardcoded to follow symlinks).
  # Retry for 30 seconds.
  - pwsh: |
      for ($i=0; $i -lt 30; $i++) {
        pnpm purge
        if ($lastexitcode -eq 0) {
          break
        }
        else {
          start-sleep 1
        }
      }
    condition: always()
    displayName: "Purge dependencies"

  # It's important for performance to pass "sdk" as "searchFolder" to avoid looking under root "node_modules".
  # PublishTestResults.searchFolder only supports absolute paths, not relative.
  - task: PublishTestResults@2
    inputs:
      searchFolder: "$(System.DefaultWorkingDirectory)/sdk"
      testResultsFiles: "**/test-results.xml"
      testRunTitle: "$(OSName) - NodeJS - Unit Tests - [Node $(NodeTestVersion)]"
    condition: and(always(),eq(variables['TestType'], 'node'))
    displayName: "Publish NodeJS unit test results"

  # It's important for performance to pass "sdk" as "searchFolder" to avoid looking under root "node_modules".
  # PublishTestResults.searchFolder only supports absolute paths, not relative.
  - task: PublishTestResults@2
    inputs:
      searchFolder: "$(System.DefaultWorkingDirectory)/sdk"
      testResultsFiles: "**/test-results.browser.xml"
      testRunTitle: "$(OSName) - Browser - Unit Tests - [Node $(NodeTestVersion)]"
    condition: and(always(),eq(variables['TestType'], 'browser'))
    displayName: "Publish browser unit test results"

  - ${{ if eq(parameters.TestProxy, true) }}:
    - template: /eng/common/pipelines/templates/steps/publish-1es-artifact.yml
      parameters:
        ArtifactPath: '$(Build.ArtifactStagingDirectory)/test-proxy.log'
        ArtifactName: 'test proxy logs $(Agent.JobName)'
        SbomEnabled: false
