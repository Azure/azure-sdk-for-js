parameters:
  - name: Artifacts
    type: object
    default: []
  - name: TestPipeline
    type: boolean
    default: false
  - name: ServiceDirectory
    type: string
    default: not-specified
  - name: TestProxy
    type: boolean
    default: true
  - name: IncludeRelease
    type: boolean
    default: true
  - name: SkipPrValidation
    type: boolean
    default: false
  - name: TargetDocRepoOwner
    type: string
    default: MicrosoftDocs
  - name: TargetDocRepoName
    type: string
    default: azure-docs-sdk-node
  - name: RunUnitTests
    type: boolean
    default: true
  - name: MatrixConfigs
    type: object
    default:
      - Name: Javascript_ci_test_base
        Path: eng/pipelines/templates/stages/platform-matrix.json
        Selection: sparse
        GenerateVMJobs: true
  - name: AdditionalMatrixConfigs
    type: object
    default: []
  - name: MatrixFilters
    type: object
    default: []
  - name: MatrixReplace
    type: object
    default: []
  - name: oneESTemplateTag
    type: string
    default: release

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    oneESTemplateTag: ${{ parameters.oneESTemplateTag }}
    stages:
      - ${{ if and(eq(parameters.SkipPrValidation, true), eq(variables['Build.Reason'], 'Manual')) }}:
          - stage: NoOp
            displayName: No-op
            variables:
              - template: /eng/pipelines/templates/variables/globals.yml@self
              - template: /eng/pipelines/templates/variables/image.yml@self
            jobs:
              - job: NoOp
                displayName: No-op
                pool:
                  name: $(LINUXPOOL)
                  image: $(LINUXVMIMAGE)
                  os: linux
                steps:
                  - checkout: none
                  - pwsh: Write-Host "PR validation skipped because SkipPrValidation was set to true for a manual run."
                    displayName: Skip PR validation

      - stage: Build
        condition: not(and(eq(${{ parameters.SkipPrValidation }}, true), eq(variables['Build.Reason'], 'Manual')))
        jobs:
          - template: /eng/pipelines/templates/jobs/ci.yml@self
            parameters:
              ServiceDirectory: ${{ parameters.ServiceDirectory }}
              TestProxy: ${{ parameters.TestProxy }}
              Artifacts: ${{ parameters.Artifacts }}
              ${{ if eq(parameters.ServiceDirectory, 'template') }}:
                TestPipeline: true
              RunUnitTests: ${{ parameters.RunUnitTests }}
              MatrixConfigs:
                - ${{ each config in parameters.MatrixConfigs }}:
                    - ${{ config }}
                - ${{ each config in parameters.AdditionalMatrixConfigs }}:
                    - ${{ config }}
              MatrixFilters:
                - TestType=node|browser
                - DependencyVersion=^$
                - PublishCodeCoverage=^$
                - ${{ each filter in parameters.MatrixFilters }}:
                    - ${{ filter}}
              MatrixReplace: ${{ parameters.MatrixReplace }}
              IncludeRelease: ${{ parameters.IncludeRelease }}
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml@self
          - template: /eng/pipelines/templates/variables/image.yml@self

      - ${{if and(not(and(eq(parameters.SkipPrValidation, true), eq(variables['Build.Reason'], 'Manual'))), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['System.TeamProject'], 'internal'), eq(parameters.IncludeRelease,true))}}:
          - template: archetype-js-release.yml@self
            parameters:
              DependsOn: Build
              ServiceDirectory: ${{ parameters.ServiceDirectory }}
              TestProxy: ${{ parameters.TestProxy }}
              Artifacts: ${{ parameters.Artifacts }}
              ${{ if eq(parameters.ServiceDirectory, 'template') }}:
                TestPipeline: true
              TargetDocRepoOwner: ${{ parameters.TargetDocRepoOwner }}
              TargetDocRepoName: ${{ parameters.TargetDocRepoName }}
