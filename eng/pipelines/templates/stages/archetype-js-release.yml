parameters:
  Artifacts: []
  TestPipeline: false
  ArtifactName: packages
  DependsOn: Build
  TargetDocRepoOwner: ''
  TargetDocRepoName: ''
  ServiceDirectory: ''

stages:
    # Gate all release stages on: internal project AND (a manual/scheduled run OR post-merge CI on main).
    # The one-line expression below is hard to scan, so here it is expanded (logically identical):
    #   and(
    #     eq(System.TeamProject, 'internal'),
    #     or(
    #       in(Build.Reason, 'Manual', ''),                             # manual queue or scheduled run
    #       and(                                                        # post-merge CI on main
    #         eq(Build.Reason, 'IndividualCI'),
    #         eq(Build.SourceBranch, 'refs/heads/main')
    #       )
    #     )
    #   )
    # The trailing ")))" right after 'refs/heads/main' closes, in order: the inner and(), the or(),
    # and the outer and(); the final " }}" then closes the template expression.
  - ${{ if and(eq(variables['System.TeamProject'], 'internal'), or(in(variables['Build.Reason'], 'Manual', ''), and(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))) }}:
      # For post-merge CI (not manual), resolve which packages the merged, auto-release-labeled PR
      # changed. Auto-release only applies to PRs merged to 'main' (the Build.SourceBranch check above),
      # so release/* and hotfix/* CI never auto-release. This shared stage emits ReleaseArtifact_<safeName>
      # booleans consumed by each release stage's condition below. It fails closed (nothing releases)
      # when there is no qualifying PR.
      - ${{ if and(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.SourceBranch'], 'refs/heads/main')) }}:
          - template: /eng/common/pipelines/templates/stages/archetype-auto-release-prepare.yml
            parameters:
              DependsOn:
                - ${{ parameters.DependsOn }}
              Artifacts: ${{ parameters.Artifacts }}
              Condition: >-
                and(
                  succeeded(),
                  ne(variables['SetDevVersion'], 'true'),
                  ne(variables['Skip.Release'], 'true'),
                  ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
                )

      - ${{ each artifact in parameters.Artifacts }}:
          - stage: 'Release_${{artifact.safename}}'
            variables:
              - template: /eng/pipelines/templates/variables/globals.yml
              - template: /eng/pipelines/templates/variables/image.yml
            displayName: 'Release: ${{artifact.name}}'
            # Manual runs release the queue-time artifact selection unchanged. Post-merge CI runs
            # additionally gate on the auto-release resolution: only release packages the labeled PR changed.
            ${{ if in(variables['Build.Reason'], 'Manual', '') }}:
              dependsOn: ${{parameters.DependsOn}}
              condition: >-
                and(
                  succeeded(),
                  ne(variables['SetDevVersion'], 'true'),
                  ne(variables['Skip.Release'], 'true'),
                  ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
                )
            ${{ else }}:
              dependsOn:
                - ${{parameters.DependsOn}}
                - AutoReleasePrepare
              condition: >-
                and(
                  succeeded(),
                  eq(dependencies.AutoReleasePrepare.outputs['ResolveAutoReleasePackages.resolve.ReleaseArtifact_${{artifact.safename}}'], 'true'),
                  ne(variables['SetDevVersion'], 'true'),
                  ne(variables['Skip.Release'], 'true'),
                  ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
                )
            jobs:
              - job: TagRepository
                displayName: Create release tag
                condition: ne(variables['Skip.TagRepository'], 'true')
                pool:
                  name: $(LINUXPOOL)
                  image: $(LINUXVMIMAGE)
                  os: linux
                steps:
                  - checkout: self
                  - download: current
                  - template: /eng/common/pipelines/templates/steps/retain-run.yml
                  - template: /eng/common/pipelines/templates/steps/set-test-pipeline-version.yml
                    parameters:
                      PackageName: '@azure/template'
                      ServiceDirectory: template
                      TestPipeline: ${{ parameters.TestPipeline }}
                  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
                    parameters:
                      npmrcPath: $(Agent.TempDirectory)/create-release-tag/.npmrc
                      registryUrl: '$(PublicDevOpsRegistry)'
                  - script: >
                      ls $(Pipeline.Workspace)/${{parameters.ArtifactName}}/${{artifact.name}}/*.tgz && npm install --userconfig=$(Agent.TempDirectory)/create-release-tag/.npmrc `ls $(Pipeline.Workspace)/${{parameters.ArtifactName}}/${{artifact.name}}/*.tgz`
                    displayName: Validating package can be installed
                  - template: /eng/common/pipelines/templates/steps/verify-changelog.yml
                    parameters:
                      PackageName: ${{artifact.name}}
                      ServiceName: ${{parameters.ServiceDirectory}}
                      ForRelease: true
                  - template: /eng/common/pipelines/templates/steps/verify-restapi-spec-location.yml
                    parameters:
                      PackageName: ${{artifact.name}}
                      ServiceDirectory: ${{parameters.ServiceDirectory}}
                      ArtifactLocation: $(Pipeline.Workspace)/${{parameters.ArtifactName}}
                  - pwsh: >
                      Get-ChildItem -Recurse ${{parameters.ArtifactName}}/${{artifact.name}}
                    workingDirectory: $(Pipeline.Workspace)
                    displayName: Output Visible Artifacts
                  - template: /eng/common/pipelines/templates/steps/create-tags-and-git-release.yml
                    parameters:
                      ArtifactLocation: $(Pipeline.Workspace)/${{parameters.ArtifactName}}/${{artifact.name}}
                      PackageRepository: Npm
                      ReleaseSha: $(Build.SourceVersion)
                      RepoId: Azure/azure-sdk-for-js
                      WorkingDirectory: $(System.DefaultWorkingDirectory)
                      NpmConfigUserConfig: $(Agent.TempDirectory)/create-release-tag/.npmrc
                      AuthToken: ''

              - ${{ if ne(artifact.skipPublishPackage, 'true') }}:
                  - template: /eng/common/pipelines/templates/jobs/npm-publish.yml
                    parameters:
                      DependsOn: TagRepository
                      DeploymentName: PublishPackage_${{ replace(artifact.name, '-', '_') }}
                      ArtifactName: ${{ parameters.ArtifactName }}
                      ArtifactSubPath: '${{ artifact.name }}'

                  - template: /eng/common/pipelines/templates/jobs/npm-publish.yml
                    parameters:
                      DependsOn: TagRepository
                      DeploymentName: PublishPackage_${{ replace(artifact.name, '-', '_') }}_To_DevFeed
                      ArtifactName: ${{ parameters.ArtifactName }}
                      ArtifactSubPath: '${{ artifact.name }}'
                      Registry: $(PublicDevOpsRegistry)

              - ${{ if ne(artifact.skipPublishDocMs, 'true') }}:
                  - job: PublishDocs
                    displayName: Docs.MS Release
                    condition: >-
                      and(
                        succeeded(),
                        ne(variables['Skip.PublishDocs'], 'true'),
                        ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
                      )
                    dependsOn: PublishPackage_${{ replace(artifact.name, '-', '_') }}_To_DevFeed
                    pool:
                      name: $(LINUXPOOL)
                      image: $(LINUXVMIMAGE)
                      os: linux
                    steps:
                      - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
                        parameters:
                          Paths:
                            - sdk/**/*.md
                            - .github/CODEOWNERS
                      - download: current
                      - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
                        parameters:
                          npmrcPath: $(Agent.TempDirectory)/doc-ms/.npmrc
                          registryUrl: '$(PublicDevOpsRegistry)'
                      - template: /eng/pipelines/templates/steps/install-rex-validation-tool.yml
                        parameters:
                          NpmConfigUserConfig: $(Agent.TempDirectory)/doc-ms/.npmrc
                      - template: /eng/common/pipelines/templates/steps/update-docsms-metadata.yml
                        parameters:
                          PackageInfoLocations:
                            - $(Pipeline.Workspace)/${{parameters.ArtifactName}}/PackageInfo/${{artifact.name}}.json
                          RepoId: Azure/azure-sdk-for-js
                          WorkingDirectory: $(System.DefaultWorkingDirectory)
                          TargetDocRepoOwner: ${{parameters.TargetDocRepoOwner}}
                          TargetDocRepoName: ${{parameters.TargetDocRepoName}}
                          Language: javascript
                          SparseCheckoutPaths:
                            - docs-ref-services/
                            - metadata/
                            - ci-configs/packages-latest.json
                            - ci-configs/packages-preview.json
                          NpmConfigUserConfig: $(Agent.TempDirectory)/doc-ms/.npmrc
                          ${{ if eq(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js')}}:
                            PackageSourceOverride: '$(PublicDevOpsRegistry)'
                          ${{ else }}:
                            PackageSourceOverride: '$(PrivateDevOpsRegistry)'

              - ${{ if ne(artifact.skipPublishDocGithubIo, 'true') }}:
                  - job: PublishDocsGitHubIO
                    displayName: Publish Docs to GitHubIO Blob Storage
                    condition: >-
                      and(
                        succeeded(),
                        ne(variables['Skip.PublishDocs'], 'true'),
                        ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
                      )
                    dependsOn: PublishPackage_${{ replace(artifact.name, '-', '_') }}_To_DevFeed
                    pool:
                      name: $(LINUXPOOL)
                      image: $(LINUXVMIMAGE)
                      os: linux
                    steps:
                      - checkout: self
                      - download: current
                      - pwsh: |
                          Get-ChildItem -Recurse ${{parameters.ArtifactName}}/${{artifact.name}}
                        workingDirectory: $(Pipeline.Workspace)
                        displayName: Output Visible Artifacts
                      - template: /eng/common/pipelines/templates/steps/publish-blobs.yml
                        parameters:
                          FolderForUpload: $(Pipeline.Workspace)/${{parameters.ArtifactName}}/${{artifact.name}}
                          TargetLanguage: javascript
                          ArtifactLocation: $(Pipeline.Workspace)/${{parameters.ArtifactName}}/${{artifact.name}}

              - ${{ if ne(artifact.skipUpdatePackageVersion, 'true') }}:
                  - job: UpdatePackageVersion
                    displayName: Update Package Version
                    condition: and(succeeded(), ne(variables['Skip.UpdatePackageVersion'], 'true'))
                    dependsOn: PublishPackage_${{ replace(artifact.name, '-', '_') }}_To_DevFeed
                    pool:
                      name: $(LINUXPOOL)
                      image: $(LINUXVMIMAGE)
                      os: linux
                    steps:
                      - checkout: self
                      - download: current
                      - template: /eng/pipelines/templates/steps/common.yml

                      # Mark package as shipped in APIView
                      - template: /eng/common/pipelines/templates/steps/create-apireview.yml
                        parameters:
                          ArtifactPath: $(Pipeline.Workspace)/packages
                          Artifacts: ${{ parameters.Artifacts }}
                          ConfigFileDir: $(Pipeline.Workspace)/packages/PackageInfo
                          MarkPackageAsShipped: true
                          ArtifactName: ${{ parameters.ArtifactName }}
                          PackageName: ${{ artifact.name }}

                      - template: /eng/common/pipelines/templates/steps/mark-release-completion.yml
                        parameters:
                          ConfigFileDir: $(Pipeline.Workspace)/packages/PackageInfo
                          PackageArtifactName: ${{ artifact.name }}

  - stage: Integration
    dependsOn: ${{ parameters.DependsOn }}
    condition: and(succeeded(), or(eq(variables['SetDevVersion'], 'true'), and(eq(variables['Build.Reason'],'Schedule'), eq(variables['System.TeamProject'], 'internal'))))
    variables:
      - template: /eng/pipelines/templates/variables/globals.yml
      - template: /eng/pipelines/templates/variables/image.yml
    jobs:
      - template: /eng/common/pipelines/templates/jobs/npm-publish.yml
        parameters:
          Tag: 'dev'
          ArtifactName: ${{ parameters.ArtifactName }}-dev-publish
          ${{ if eq(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js')}}:
            Registry: '$(PublicDevOpsRegistry)'
          ${{ else }}:
            Registry: '$(PrivateDevOpsRegistry)'
          FailOnMissingPackages: false
          Environment: 'none'

      - job: PublishDocsToNightlyBranch
        # Wait for publishing job to complete before running
        dependsOn: 'PublishPackage'
        condition: >-
          and(
            succeeded(),
            ne(variables['Skip.PublishDocs'], 'true'),
            ne(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js-pr')
          )
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        steps:
          - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
            parameters:
              Paths:
                - sdk/**/*.md
                - .github/CODEOWNERS
          - download: current
          - pwsh: |
              Get-ChildItem -Recurse $(Pipeline.Workspace)/${{parameters.ArtifactName}}/
            displayName: Show visible artifacts
          - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
            parameters:
              npmrcPath: $(Agent.TempDirectory)/publish-docs/.npmrc
              ${{ if eq(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js')}}:
                registryUrl: '$(PublicDevOpsRegistry)'
              ${{ else }}:
                registryUrl: '$(PrivateDevOpsRegistry)'
          - template: /eng/pipelines/templates/steps/install-rex-validation-tool.yml
            parameters:
              NpmConfigUserConfig: $(Agent.TempDirectory)/publish-docs/.npmrc
          - template: /eng/common/pipelines/templates/steps/update-docsms-metadata.yml
            parameters:
              NpmConfigUserConfig: $(Agent.TempDirectory)/publish-docs/.npmrc
              PackageInfoLocations:
                - ${{ each artifact in parameters.Artifacts }}:
                    - ${{if ne(artifact.skipPublishDocMs, 'true')}}:
                        - $(Pipeline.Workspace)/${{parameters.ArtifactName}}/PackageInfo/${{artifact.name}}.json
              RepoId: Azure/azure-sdk-for-js
              WorkingDirectory: $(System.DefaultWorkingDirectory)
              TargetDocRepoOwner: ${{parameters.TargetDocRepoOwner}}
              TargetDocRepoName: ${{parameters.TargetDocRepoName}}
              Language: javascript
              DailyDocsBuild: true
              SparseCheckoutPaths:
                - docs-ref-services/
                - metadata/
                - ci-configs/packages-latest.json
                - ci-configs/packages-preview.json
              ${{ if eq(variables['Build.Repository.Name'], 'Azure/azure-sdk-for-js')}}:
                PackageSourceOverride: '$(PublicDevOpsRegistry)'
              ${{ else }}:
                PackageSourceOverride: '$(PrivateDevOpsRegistry)'
          - template: /eng/common/pipelines/templates/steps/docsms-ensure-validation.yml
