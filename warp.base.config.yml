# Base warp configuration for Azure SDK packages.
# Individual packages extend this with:
#   extends: ../../../warp.base.config.yml

# Automatically drop the browser / react-native targets for packages that ship
# no platform-specific source code (no polyfill files or #-imports mapping).
# Their output would be identical to the ESM build, so those consumers fall
# through to the `import` condition instead. Mirrors PR #38870.
prunePlatformTargets: true

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"
  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
    moduleType: commonjs
