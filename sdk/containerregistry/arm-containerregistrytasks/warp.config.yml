# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/registries": "./src/api/registries/index.ts"
  "./api/tasks": "./src/api/tasks/index.ts"
  "./api/taskRuns": "./src/api/taskRuns/index.ts"
  "./api/runs": "./src/api/runs/index.ts"
  "./api/agentPools": "./src/api/agentPools/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
