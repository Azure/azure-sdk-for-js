# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/discoveryRules": "./src/api/discoveryRules/index.ts"
  "./api/relationships": "./src/api/relationships/index.ts"
  "./api/entities": "./src/api/entities/index.ts"
  "./api/authenticationSettings": "./src/api/authenticationSettings/index.ts"
  "./api/signalDefinitions": "./src/api/signalDefinitions/index.ts"
  "./api/healthModels": "./src/api/healthModels/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
