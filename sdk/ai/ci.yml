# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - release/*
      - hotfix/*
  paths:
    include:
      - sdk/ai/ai-agents
      - sdk/ai/ci.yml
      - sdk/ai/ai-inference-rest
      - sdk/ai/ai-projects
pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - sdk/ai/ai-agents
      - sdk/ai/ci.yml
      - sdk/ai/ai-inference-rest
      - sdk/ai/ai-projects
extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: ai
    Artifacts:
      - name: azure-ai-agents
        safeName: azureaiagents
      - name: azure-rest-ai-inference
        safeName: azurerestaiinference
      - name: azure-ai-projects
        safeName: azureaiprojects
