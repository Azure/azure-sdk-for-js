# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/enrollments": "./src/api/enrollments/index.ts"
  "./api/usagePlans": "./src/api/usagePlans/index.ts"
  "./api/unifiedResilienceItems": "./src/api/unifiedResilienceItems/index.ts"
  "./api/drillRunResources": "./src/api/drillRunResources/index.ts"
  "./api/drillRuns": "./src/api/drillRuns/index.ts"
  "./api/drillResources": "./src/api/drillResources/index.ts"
  "./api/drills": "./src/api/drills/index.ts"
  "./api/recoveryJobResources": "./src/api/recoveryJobResources/index.ts"
  "./api/recoveryJobs": "./src/api/recoveryJobs/index.ts"
  "./api/recoveryResources": "./src/api/recoveryResources/index.ts"
  "./api/recoveryPlanActions": "./src/api/recoveryPlanActions/index.ts"
  "./api/recoveryPlans": "./src/api/recoveryPlans/index.ts"
  "./api/goalResources": "./src/api/goalResources/index.ts"
  "./api/goalTemplates": "./src/api/goalTemplates/index.ts"
  "./api/goalAssignments": "./src/api/goalAssignments/index.ts"
  "./api/operationStatus": "./src/api/operationStatus/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
