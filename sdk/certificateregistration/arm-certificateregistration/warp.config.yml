
extends: ../../../warp.base.config.yml

exports:
  "./api": "./src/api/index.ts"
  "./api/certificateRegistrationProvider": "./src/api/certificateRegistrationProvider/index.ts"
  "./api/certificateOrdersDiagnostics": "./src/api/certificateOrdersDiagnostics/index.ts"
  "./api/appServiceCertificateOrders": "./src/api/appServiceCertificateOrders/index.ts"
  "./models": "./src/models/index.ts"
  
targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
