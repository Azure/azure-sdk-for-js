# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/clusterVersions": "src/api/clusterVersions/index.ts"
  "./api/services": "src/api/services/index.ts"
  "./api/applications": "src/api/applications/index.ts"
  "./api/applicationTypeVersions": "src/api/applicationTypeVersions/index.ts"
  "./api/applicationTypes": "src/api/applicationTypes/index.ts"
  "./api/unsupportedVmSizes": "src/api/unsupportedVmSizes/index.ts"
  "./api/clusters": "src/api/clusters/index.ts"
  "./api/operations": "src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
    polyfillSuffix: "-browser"

  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
    polyfillSuffix: "-react-native"

  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
