  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/sitesByServiceGroup": "./src/api/sitesByServiceGroup/index.ts"
  "./api/sitesBySubscription": "./src/api/sitesBySubscription/index.ts"
  "./api/sites": "./src/api/sites/index.ts"
