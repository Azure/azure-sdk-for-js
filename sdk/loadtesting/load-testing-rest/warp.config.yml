# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./loadTestAdministration": "./src/loadTestAdministration/index.ts"
  "./loadTestAdministration/api": "./src/loadTestAdministration/api/index.ts"
  "./loadTestRun": "./src/loadTestRun/index.ts"
  "./loadTestRun/api": "./src/loadTestRun/api/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
