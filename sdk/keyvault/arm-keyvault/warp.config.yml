# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/mhsmPrivateEndpointConnections": "src/api/mhsmPrivateEndpointConnections/index.ts"
  "./api/mhsmRegions": "src/api/mhsmRegions/index.ts"
  "./api/mhsmPrivateLinkResources": "src/api/mhsmPrivateLinkResources/index.ts"
  "./api/privateLinkResources": "src/api/privateLinkResources/index.ts"
  "./api/managedHsmKeys": "src/api/managedHsmKeys/index.ts"
  "./api/keys": "src/api/keys/index.ts"
  "./api/secrets": "src/api/secrets/index.ts"
  "./api/managedHsms": "src/api/managedHsms/index.ts"
  "./api/privateEndpointConnections": "src/api/privateEndpointConnections/index.ts"
  "./api/vaults": "src/api/vaults/index.ts"
  "./api/operations": "src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
    polyfillSuffix: "-browser"

  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
    polyfillSuffix: "-react-native"

  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
    moduleType: commonjs
