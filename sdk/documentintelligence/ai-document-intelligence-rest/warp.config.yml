# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./generated/index.ts"
  "./documentIntelligence": "./generated/documentIntelligence/index.ts"
  "./documentIntelligence/api": "./generated/documentIntelligence/api/index.ts"
  "./documentIntelligenceAdministration": "./generated/documentIntelligenceAdministration/index.ts"
  "./documentIntelligenceAdministration/api": "./generated/documentIntelligenceAdministration/api/index.ts"
  "./models": "./generated/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
