extends: ../../../warp.base.config.yml

# Node-only package - protobuf support currently only for Node.js
targets:
  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
