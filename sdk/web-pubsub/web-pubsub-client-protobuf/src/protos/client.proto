syntax = "proto3";

import "google/protobuf/any.proto";

message UpstreamMessage {
    oneof message {
        SendToGroupMessage send_to_group_message = 1;
        EventMessage event_message = 5;
        JoinGroupMessage join_group_message = 6;
        LeaveGroupMessage leave_group_message = 7;
        SequenceAckMessage sequence_ack_message = 8;
        SetGroupStateMessage set_group_state_message = 15;
        SubscribeGroupStateMessage subscribe_group_state_message = 16;
        UnsubscribeGroupStateMessage unsubscribe_group_state_message = 17;
    }

    message SendToGroupMessage {
        string group = 1;
        optional uint64 ack_id = 2;
        MessageData data = 3;
        optional bool no_echo = 4;
    }

    message EventMessage {
        string event = 1;
        MessageData data = 2;
        optional uint64 ack_id = 3;
    }

    message JoinGroupMessage {
        string group = 1;
        optional uint64 ack_id = 2;
    }

    message LeaveGroupMessage {
        string group = 1;
        optional uint64 ack_id = 2;
    }

    message SequenceAckMessage {
        uint64 sequence_id = 1;
    }

    message SetGroupStateMessage {
        string group = 1;
        optional uint64 ack_id = 2;
        optional GroupStateItem.GroupState state = 3;
    }

    message SubscribeGroupStateMessage {
        string group = 1;
        optional uint64 ack_id = 2;
    }

    message UnsubscribeGroupStateMessage {
        string group = 1;
        optional uint64 ack_id = 2;
    }
}

message DownstreamMessage {
    oneof message {
        AckMessage ack_message = 1;
        DataMessage data_message = 2;
        SystemMessage system_message = 3;
        GroupStateUpdateMessage group_state_update_message = 9;
        GroupStateSnapshotMessage group_state_snapshot_message = 10;
    }

    message AckMessage {
        uint64 ack_id = 1;
        bool success = 2;
        optional ErrorMessage error = 3;

        message ErrorMessage {
            string name = 1;
            string message = 2;
        }
    }

    message DataMessage {
        string from = 1;
        optional string group = 2;
        MessageData data = 3;
        optional uint64 sequence_id = 4;
    }

    message SystemMessage {
        oneof message {
            ConnectedMessage connected_message = 1;
            DisconnectedMessage disconnected_message = 2;
        }

        message ConnectedMessage {
            string connection_id = 1;
            string user_id = 2;
            string reconnection_token = 3;
        }

        message DisconnectedMessage {
            string reason = 2;
        }
    }

    message GroupStateSnapshotMessage {
        string group = 1;
        repeated GroupStateItem items = 2;
        optional uint64 sequence_id = 3;
    }

    message GroupStateUpdateMessage {
        string group = 1;
        repeated GroupStateItem items = 2;
        optional uint64 sequence_id = 3;
    }
}

message MessageData {
    oneof data {
        string text_data = 1;
        bytes binary_data = 2;
        google.protobuf.Any protobuf_data = 3;
        string json_data = 4;
    }
}

message GroupStateItem {
    string connection_id = 1;
    optional string user_id = 2;
    optional GroupState state = 3;
    int64 updated_at = 4;

    message GroupState {
        map<string, string> entries = 1;
    }
}
