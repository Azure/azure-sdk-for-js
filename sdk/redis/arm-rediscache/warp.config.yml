# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/asyncOperationStatus": "./src/api/asyncOperationStatus/index.ts"
  "./api/accessPolicyAssignment": "./src/api/accessPolicyAssignment/index.ts"
  "./api/accessPolicy": "./src/api/accessPolicy/index.ts"
  "./api/patchSchedules": "./src/api/patchSchedules/index.ts"
  "./api/firewallRules": "./src/api/firewallRules/index.ts"
  "./api/privateLinkResources": "./src/api/privateLinkResources/index.ts"
  "./api/redis": "./src/api/redis/index.ts"
  "./api/privateEndpointConnections": "./src/api/privateEndpointConnections/index.ts"
  "./api/linkedServer": "./src/api/linkedServer/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
