# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/policyTokens": "./src/api/policyTokens/index.ts"
  "./api/policySetDefinitionVersions": "./src/api/policySetDefinitionVersions/index.ts"
  "./api/policySetDefinitions": "./src/api/policySetDefinitions/index.ts"
  "./api/policyDefinitionVersions": "./src/api/policyDefinitionVersions/index.ts"
  "./api/policyDefinitions": "./src/api/policyDefinitions/index.ts"
  "./api/policyAssignments": "./src/api/policyAssignments/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
