# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/sharedPrivateLinkResources": "./src/api/sharedPrivateLinkResources/index.ts"
  "./api/targets": "./src/api/targets/index.ts"
  "./api/healthValidations": "./src/api/healthValidations/index.ts"
  "./api/alertRuleResources": "./src/api/alertRuleResources/index.ts"
  "./api/watchers": "./src/api/watchers/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
