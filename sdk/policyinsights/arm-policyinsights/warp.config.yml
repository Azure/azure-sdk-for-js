# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./models": "./src/models/index.ts"
  "./models/policyInsightsApi": "./src/models/policyInsightsApi/index.ts"
  "./models/policyInsightsCommon": "./src/models/policyInsightsCommon/index.ts"
  "./models/policyInsightsManagementClient": "./src/models/policyInsightsManagementClient/index.ts"
  "./models/policyTrackedResourcesApi": "./src/models/policyTrackedResourcesApi/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
