# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/azureTrafficCollectorsBySubscription": "./src/api/azureTrafficCollectorsBySubscription/index.ts"
  "./api/azureTrafficCollectorsByResourceGroup": "./src/api/azureTrafficCollectorsByResourceGroup/index.ts"
  "./api/networkFunction": "./src/api/networkFunction/index.ts"
  "./api/collectorPolicies": "./src/api/collectorPolicies/index.ts"
  "./api/azureTrafficCollectors": "./src/api/azureTrafficCollectors/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
