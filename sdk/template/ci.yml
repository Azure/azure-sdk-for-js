# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - release/*
      - hotfix/*
  paths:
    include:
      - sdk/template/
      - eng/common/
      - sdk/template/ci.yml
pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - sdk/template/
      - eng/common/
      - sdk/template/ci.yml
parameters:
  - name: oneESTemplateTag
    type: string
    default: release
    values:
      - release
      - canary
extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    oneESTemplateTag: ${{ parameters.oneESTemplateTag }}
    ServiceDirectory: template
    Artifacts:
      - name: azure-template
        safeName: azuretemplate
        triggeringPaths:
          - /sdk/test-utils/
          - /sdk/identity/
          - /.config/
          - /.devcontainer/
          - /.github/
          - /.scripts/
          - /common/
          - /eng/
      - name: azure-template-dpg
        safeName: azuretemplatedpg
