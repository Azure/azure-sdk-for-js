# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/discoverySolutionNLP": "./src/api/discoverySolutionNLP/index.ts"
  "./api/discoverySolution": "./src/api/discoverySolution/index.ts"
  "./api/checkNameAvailability": "./src/api/checkNameAvailability/index.ts"
  "./api/solutionSelfHelp": "./src/api/solutionSelfHelp/index.ts"
  "./api/troubleshooters": "./src/api/troubleshooters/index.ts"
  "./api/simplifiedSolutions": "./src/api/simplifiedSolutions/index.ts"
  "./api/solution": "./src/api/solution/index.ts"
  "./api/diagnostics": "./src/api/diagnostics/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
