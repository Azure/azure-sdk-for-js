# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/dnsResourceReference": "./src/api/dnsResourceReference/index.ts"
  "./api/zones": "./src/api/zones/index.ts"
  "./api/recordSets": "./src/api/recordSets/index.ts"
  "./api/dnssecConfigs": "./src/api/dnssecConfigs/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
