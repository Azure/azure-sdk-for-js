# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/sqlVirtualMachineTroubleshoot": "./src/api/sqlVirtualMachineTroubleshoot/index.ts"
  "./api/sqlVirtualMachineGroups": "./src/api/sqlVirtualMachineGroups/index.ts"
  "./api/sqlVirtualMachines": "./src/api/sqlVirtualMachines/index.ts"
  "./api/availabilityGroupListeners": "./src/api/availabilityGroupListeners/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
