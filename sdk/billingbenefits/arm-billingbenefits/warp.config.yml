# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/freeServices": "./src/api/freeServices/index.ts"
  "./api/sources": "./src/api/sources/index.ts"
  "./api/applicableMaccs": "./src/api/applicableMaccs/index.ts"
  "./api/sellerResource": "./src/api/sellerResource/index.ts"
  "./api/benefit": "./src/api/benefit/index.ts"
  "./api/discount": "./src/api/discount/index.ts"
  "./api/reservationOrderAlias": "./src/api/reservationOrderAlias/index.ts"
  "./api/savingsPlan": "./src/api/savingsPlan/index.ts"
  "./api/savingsPlanOrder": "./src/api/savingsPlanOrder/index.ts"
  "./api/savingsPlanOrderAlias": "./src/api/savingsPlanOrderAlias/index.ts"
  "./api/maccs": "./src/api/maccs/index.ts"
  "./api/conditionalCreditContributors": "./src/api/conditionalCreditContributors/index.ts"
  "./api/conditionalCredits": "./src/api/conditionalCredits/index.ts"
  "./api/credits": "./src/api/credits/index.ts"
  "./api/contributors": "./src/api/contributors/index.ts"
  "./api/discounts": "./src/api/discounts/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
