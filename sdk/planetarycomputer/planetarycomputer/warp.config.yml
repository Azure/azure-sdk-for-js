# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/sharedAccessSignature": "./src/api/sharedAccessSignature/index.ts"
  "./api/data": "./src/api/data/index.ts"
  "./api/stac": "./src/api/stac/index.ts"
  "./api/ingestion": "./src/api/ingestion/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: react-native
    tsconfig: "./config/tsconfig.src.react-native.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
