# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/providerResourceTypes": "./src/api/providerResourceTypes/index.ts"
  "./api/providers": "./src/api/providers/index.ts"
  "./api/tagsOperations": "./src/api/tagsOperations/index.ts"
  "./api/resources": "./src/api/resources/index.ts"
  "./api/resourceGroups": "./src/api/resourceGroups/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
