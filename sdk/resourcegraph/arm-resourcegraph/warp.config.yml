# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./models": "./src/models/index.ts"
  "./models/graphQueryApi": "./src/models/graphQueryApi/index.ts"
  "./models/resourceChanges": "./src/models/resourceChanges/index.ts"
  "./models/resourceGraphApi": "./src/models/resourceGraphApi/index.ts"
  "./models/resourceGraphCommon": "./src/models/resourceGraphCommon/index.ts"
  "./models/resourceHistory": "./src/models/resourceHistory/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
