# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/horizonDbParameterGroups": "src/api/horizonDbParameterGroups/index.ts"
  "./api/horizonDbPrivateLinkResources": "src/api/horizonDbPrivateLinkResources/index.ts"
  "./api/horizonDbPrivateEndpointConnections": "src/api/horizonDbPrivateEndpointConnections/index.ts"
  "./api/horizonDbFirewallRules": "src/api/horizonDbFirewallRules/index.ts"
  "./api/horizonDbReplicas": "src/api/horizonDbReplicas/index.ts"
  "./api/horizonDbPools": "src/api/horizonDbPools/index.ts"
  "./api/horizonDbClusters": "src/api/horizonDbClusters/index.ts"
  "./api/operations": "src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
    polyfillSuffix: "-browser"

  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
    polyfillSuffix: "-react-native"

  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
