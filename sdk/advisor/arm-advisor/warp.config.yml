# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/workloads": "./src/api/workloads/index.ts"
  "./api/assessmentTypes": "./src/api/assessmentTypes/index.ts"
  "./api/configurations": "./src/api/configurations/index.ts"
  "./api/triageResources": "./src/api/triageResources/index.ts"
  "./api/triageRecommendations": "./src/api/triageRecommendations/index.ts"
  "./api/resiliencyReviews": "./src/api/resiliencyReviews/index.ts"
  "./api/assessments": "./src/api/assessments/index.ts"
  "./api/advisorScores": "./src/api/advisorScores/index.ts"
  "./api/suppressions": "./src/api/suppressions/index.ts"
  "./api/recommendations": "./src/api/recommendations/index.ts"
  "./api/recommendationMetadata": "./src/api/recommendationMetadata/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
