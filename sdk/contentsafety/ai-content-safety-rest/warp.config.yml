# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./contentSafety": "./src/contentSafety/index.ts"
  "./contentSafety/api": "./src/contentSafety/api/index.ts"
  "./blocklist": "./src/blocklist/index.ts"
  "./blocklist/api": "./src/blocklist/api/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
