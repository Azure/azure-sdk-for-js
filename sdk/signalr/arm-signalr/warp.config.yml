# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/usages": "./src/api/usages/index.ts"
  "./api/signalRReplicaSharedPrivateLinkResources": "./src/api/signalRReplicaSharedPrivateLinkResources/index.ts"
  "./api/signalRReplicas": "./src/api/signalRReplicas/index.ts"
  "./api/signalRPrivateEndpointConnections": "./src/api/signalRPrivateEndpointConnections/index.ts"
  "./api/signalRCustomDomains": "./src/api/signalRCustomDomains/index.ts"
  "./api/signalRCustomCertificates": "./src/api/signalRCustomCertificates/index.ts"
  "./api/signalRPrivateLinkResources": "./src/api/signalRPrivateLinkResources/index.ts"
  "./api/signalR": "./src/api/signalR/index.ts"
  "./api/signalRSharedPrivateLinkResources": "./src/api/signalRSharedPrivateLinkResources/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
