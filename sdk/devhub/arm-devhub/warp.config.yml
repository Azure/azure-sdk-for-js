# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/versionedTemplate": "./src/api/versionedTemplate/index.ts"
  "./api/template": "./src/api/template/index.ts"
  "./api/adooAuth": "./src/api/adooAuth/index.ts"
  "./api/workflow": "./src/api/workflow/index.ts"
  "./api/adooAuthResponses": "./src/api/adooAuthResponses/index.ts"
  "./api/iacProfiles": "./src/api/iacProfiles/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
    polyfillSuffix: "-browser"

  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
    polyfillSuffix: "-react-native"

  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
