# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/versionedTemplate": "./src/api/versionedTemplate/index.ts"
  "./api/template": "./src/api/template/index.ts"
  "./api/adooAuth": "./src/api/adooAuth/index.ts"
  "./api/workflowOperations": "./src/api/workflowOperations/index.ts"
  "./api/iacProfiles": "./src/api/iacProfiles/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
