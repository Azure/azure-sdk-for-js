# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/locations": "src/api/locations/index.ts"
  "./api/virtualMachines": "src/api/virtualMachines/index.ts"
  "./api/scriptExecutionHistory": "src/api/scriptExecutionHistory/index.ts"
  "./api/scriptActions": "src/api/scriptActions/index.ts"
  "./api/extensions": "src/api/extensions/index.ts"
  "./api/configurations": "src/api/configurations/index.ts"
  "./api/privateLinkResources": "src/api/privateLinkResources/index.ts"
  "./api/privateEndpointConnections": "src/api/privateEndpointConnections/index.ts"
  "./api/clusters": "src/api/clusters/index.ts"
  "./api/applications": "src/api/applications/index.ts"
  "./api/operations": "src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "../../../tsconfig.src.browser.json"
    polyfillSuffix: "-browser"

  - name: react-native
    tsconfig: "../../../tsconfig.src.react-native.json"
    polyfillSuffix: "-react-native"

  - name: esm
    condition: import
    tsconfig: "../../../tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "../../../tsconfig.src.cjs.json"
