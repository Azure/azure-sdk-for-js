# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/roleMappings": "./src/api/roleMappings/index.ts"
  "./api/protectedItemsOperationGroup": "./src/api/protectedItemsOperationGroup/index.ts"
  "./api/protectedItems": "./src/api/protectedItems/index.ts"
  "./api/protectionGroups": "./src/api/protectionGroups/index.ts"
  "./api/plans": "./src/api/plans/index.ts"
  "./api/storages": "./src/api/storages/index.ts"
  "./api/saaSOperationGroup": "./src/api/saaSOperationGroup/index.ts"
  "./api/cloudAccounts": "./src/api/cloudAccounts/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
