# warp.config.yml - @azure/core-process build configuration

extends: ../../../warp.base.config.yml

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"

targets:
  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
