# warp.config.yml — @typespec/ts-http-runtime build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./internal/util": "./src/util/internal.ts"
  "./internal/logger": "./src/logger/internal.ts"
  "./internal/policies": "./src/policies/internal.ts"

targets:
  - name: browser
    tsconfig: "./src/tsconfig.browser.json"
    resolveImports: true

  - name: react-native
    tsconfig: "./src/tsconfig.react-native.json"
    resolveImports: true

  - name: esm
    condition: import
    tsconfig: "./src/tsconfig.esm.json"
    resolveImports: true

  - name: commonjs
    condition: require
    tsconfig: "./src/tsconfig.cjs.json"
    resolveImports: true
