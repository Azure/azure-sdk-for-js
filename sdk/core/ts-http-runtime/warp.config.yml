# warp.config.yml — @typespec/ts-http-runtime build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./internal/util": "./src/util/internal.ts"
  "./internal/logger": "./src/logger/internal.ts"
  "./internal/policies": "./src/policies/internal.ts"

targets:
  # workerd must precede browser: the Cloudflare Workers runtime activates the
  # "browser", "import" and "workerd" conditions simultaneously, and exports
  # conditions are matched in declaration order. Listing workerd first ensures
  # workerd resolves to this Node-compatible build instead of the browser build.
  - name: workerd
    tsconfig: "./config/tsconfig.src.workerd.json"

  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: react-native
    tsconfig: "./config/tsconfig.src.react-native.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
