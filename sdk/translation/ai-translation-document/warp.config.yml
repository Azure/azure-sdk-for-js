# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./documentTranslation": "./src/documentTranslation/index.ts"
  "./documentTranslation/api": "./src/documentTranslation/api/index.ts"
  "./singleDocumentTranslation": "./src/singleDocumentTranslation/index.ts"
  "./singleDocumentTranslation/api": "./src/singleDocumentTranslation/api/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
