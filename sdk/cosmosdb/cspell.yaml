# cspell configuration for this service. Words are case-insensitive and
# kept sorted alphabetically. The import of the central config is required.
import:
  - ../../.vscode/cspell.json
words:
  - colls
  - Funtion
  - Parition
  - pkranges
  - rerank
  - sproc
  - sprocs
  - udfs
  - xmax
  - xmin
  - ymax
  - ymin
