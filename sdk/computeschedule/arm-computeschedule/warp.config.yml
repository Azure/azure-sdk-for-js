# warp.config.yml — build configuration

exports:
  "./package.json": "./package.json"
  ".": "./src/index.ts"
  "./api": "./src/api/index.ts"
  "./api/occurrenceExtension": "./src/api/occurrenceExtension/index.ts"
  "./api/occurrences": "./src/api/occurrences/index.ts"
  "./api/scheduledActionExtension": "./src/api/scheduledActionExtension/index.ts"
  "./api/scheduledActions": "./src/api/scheduledActions/index.ts"
  "./api/operations": "./src/api/operations/index.ts"
  "./models": "./src/models/index.ts"

targets:
  - name: browser
    tsconfig: "./config/tsconfig.src.browser.json"

  - name: esm
    condition: import
    tsconfig: "./config/tsconfig.src.esm.json"

  - name: commonjs
    condition: require
    tsconfig: "./config/tsconfig.src.cjs.json"
    moduleType: commonjs
